name: Issue to Automation Bridge

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number for manual bridge test"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  bridge:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      BASE_BRANCH: develop
    steps:
      - name: Resolve and validate trigger
        id: gate
        env:
          DISPATCH_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        run: |
          set -euo pipefail

          EVENT_NAME="${GITHUB_EVENT_NAME}"
          ACTION=$(jq -r '.action // empty' "${GITHUB_EVENT_PATH}")

          ISSUE_NUMBER=""
          ISSUE_TITLE=""
          ISSUE_URL=""
          ISSUE_BODY=""
          COMMENT_BODY=""
          SHOULD_RUN="false"

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ -z "${DISPATCH_ISSUE_NUMBER}" ]; then
              echo "Manual run skipped: inputs.issue_number is empty."
            else
              ISSUE_JSON=$(gh issue view "${DISPATCH_ISSUE_NUMBER}" --repo "${REPO}" --json number,title,body,url,labels)
              if echo "${ISSUE_JSON}" | jq -e '.labels[].name | select(. == "ready-for-cursor")' >/dev/null; then
                ISSUE_NUMBER=$(echo "${ISSUE_JSON}" | jq -r '.number')
                ISSUE_TITLE=$(echo "${ISSUE_JSON}" | jq -r '.title')
                ISSUE_BODY=$(echo "${ISSUE_JSON}" | jq -r '.body')
                ISSUE_URL=$(echo "${ISSUE_JSON}" | jq -r '.url')
                SHOULD_RUN="true"
              else
                echo "Manual run skipped: issue does not have ready-for-cursor label."
              fi
            fi
          else
            ISSUE_NUMBER=$(jq -r '.issue.number // empty' "${GITHUB_EVENT_PATH}")
            COMMENT_BODY=$(jq -r '.comment.body // empty' "${GITHUB_EVENT_PATH}")
            LABEL_NAME=$(jq -r '.label.name // empty' "${GITHUB_EVENT_PATH}")
            ISSUE_PR_URL=$(jq -r '.issue.pull_request.url // empty' "${GITHUB_EVENT_PATH}")

            if [ -z "${ISSUE_NUMBER}" ]; then
              echo "Skip: event payload has no issue number."
            elif [ -n "${ISSUE_PR_URL}" ]; then
              echo "Skip: issue_comment is for PR conversation, not issue."
            else
              ISSUE_API_JSON=$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}")
              ISSUE_TITLE=$(echo "${ISSUE_API_JSON}" | jq -r '.title')
              ISSUE_BODY=$(echo "${ISSUE_API_JSON}" | jq -r '.body')
              ISSUE_URL=$(echo "${ISSUE_API_JSON}" | jq -r '.html_url')

              if [ "${EVENT_NAME}" = "issues" ] && [ "${ACTION}" = "labeled" ] && [ "${LABEL_NAME}" = "ready-for-cursor" ]; then
                SHOULD_RUN="true"
              elif [ "${EVENT_NAME}" = "issue_comment" ] && printf "%s" "${COMMENT_BODY}" | grep -qE '^/auto(\s|$)'; then
                LABELS_JSON=$(echo "${ISSUE_API_JSON}" | jq -c '.labels')
                if printf "%s" "${LABELS_JSON}" | jq -e '.[] | select(.name == "ready-for-cursor")' >/dev/null; then
                  SHOULD_RUN="true"
                else
                  echo "Skip: /auto comment found but issue has no ready-for-cursor label."
                fi
              else
                echo "Skip: event did not match bridge conditions."
              fi
            fi
          fi

          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "issue_title<<EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "${ISSUE_TITLE}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "issue_body<<EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "${ISSUE_BODY}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "issue_url=${ISSUE_URL}" >> "$GITHUB_OUTPUT"
          echo "comment_body<<EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "${COMMENT_BODY}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Stop when conditions are not met
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "Bridge conditions not met. Exiting successfully."
          exit 0

      - name: Checkout repository
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create or update bridge branch
        if: steps.gate.outputs.should_run == 'true'
        id: branch
        run: |
          set -euo pipefail

          EVENT_NAME="${GITHUB_EVENT_NAME}"
          EVENT_ACTION=$(jq -r '.action // empty' "${GITHUB_EVENT_PATH}")
          ISSUE_NUMBER="${{ steps.gate.outputs.issue_number }}"
          ISSUE_TITLE="${{ steps.gate.outputs.issue_title }}"
          ISSUE_BODY="${{ steps.gate.outputs.issue_body }}"
          ISSUE_URL="${{ steps.gate.outputs.issue_url }}"
          COMMENT_BODY="${{ steps.gate.outputs.comment_body }}"

          BRANCH_NAME="auto/issue-${ISSUE_NUMBER}"
          FILE_PATH=".cursor/automation-bridge/issue-${ISSUE_NUMBER}.md"

          git fetch origin "${BASE_BRANCH}"

          if git ls-remote --heads origin "${BRANCH_NAME}" | grep -q "${BRANCH_NAME}"; then
            git checkout -B "${BRANCH_NAME}" "origin/${BRANCH_NAME}"
          else
            git checkout -B "${BRANCH_NAME}" "origin/${BASE_BRANCH}"
          fi

          mkdir -p .cursor/automation-bridge

          {
            echo "# Issue Bridge Snapshot"
            echo ""
            echo "- Issue: #${ISSUE_NUMBER}"
            echo "- Title: ${ISSUE_TITLE}"
            echo "- URL: ${ISSUE_URL}"
            echo "- Trigger: ${EVENT_NAME}/${EVENT_ACTION}"
            echo "- Updated At (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo ""
            echo "## Body"
            echo ""
            printf "%s\n" "${ISSUE_BODY}"
            if [ -n "${COMMENT_BODY}" ]; then
              echo ""
              echo "## Auto Command"
              echo ""
              printf "%s\n" "${COMMENT_BODY}"
            fi
          } > "${FILE_PATH}"

          git add "${FILE_PATH}"
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: bridge issue #${ISSUE_NUMBER} to automation trigger"
            git push -u origin "${BRANCH_NAME}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "file_path=${FILE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Create or find PR
        if: steps.gate.outputs.should_run == 'true'
        id: pr
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.gate.outputs.issue_number }}"
          ISSUE_URL="${{ steps.gate.outputs.issue_url }}"
          BRANCH_NAME="${{ steps.branch.outputs.branch_name }}"
          EXISTING_PR=$(gh pr list \
            --repo "${REPO}" \
            --base "${BASE_BRANCH}" \
            --head "${BRANCH_NAME}" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "${EXISTING_PR}" ]; then
            gh pr create \
              --repo "${REPO}" \
              --base "${BASE_BRANCH}" \
              --head "${BRANCH_NAME}" \
              --title "chore: auto bridge for issue #${ISSUE_NUMBER}" \
              --body "## Bridge PR

This PR is created automatically to bridge GitHub Issue events to Cursor Automations.

- Source issue: #${ISSUE_NUMBER}
- Issue URL: ${ISSUE_URL}
- Snapshot file: \`${{ steps.branch.outputs.file_path }}\`

Do not merge this PR manually unless you intentionally want to keep the snapshot changes." \
              --label "chore"

            PR_NUMBER=$(gh pr list \
              --repo "${REPO}" \
              --base "${BASE_BRANCH}" \
              --head "${BRANCH_NAME}" \
              --state open \
              --json number \
              --jq '.[0].number')
          else
            PR_NUMBER="${EXISTING_PR}"
          fi

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Comment AUTO trigger on PR
        if: steps.gate.outputs.should_run == 'true'
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.gate.outputs.issue_number }}"
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          MARKER="<!-- issue-auto-bridge:${ISSUE_NUMBER}:${GITHUB_RUN_ID} -->"

          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "AUTO: Issue #${ISSUE_NUMBER} を処理してください。

${MARKER}

要件:
- まず Issue 本文を正本として読み、実装範囲を特定する
- 変更は最小限にする
- 不明点があれば PR に質問コメントを返す
- 修正後はこのPRに commit する"
