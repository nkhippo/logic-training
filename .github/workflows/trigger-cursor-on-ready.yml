name: Trigger Cursor on ready-for-cursor

on:
  issues:
    types: [labeled]

permissions:
  issues: read

jobs:
  trigger:
    if: github.event.label.name == 'ready-for-cursor'
    runs-on: ubuntu-latest
    steps:
      - name: Validate webhook secrets
        if: github.event.issue.pull_request == null
        env:
          WEBHOOK_URL: ${{ secrets.CURSOR_AUTOMATION_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.CURSOR_AUTOMATION_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_URL}" ] || [ -z "${WEBHOOK_TOKEN}" ]; then
            echo "::error::Missing GitHub Actions secrets."
            echo "Register CURSOR_AUTOMATION_WEBHOOK_URL and CURSOR_AUTOMATION_WEBHOOK_TOKEN in repository Settings > Secrets > Actions."
            exit 1
          fi

      - name: POST to Cursor Automation webhook
        if: github.event.issue.pull_request == null
        env:
          WEBHOOK_URL: ${{ secrets.CURSOR_AUTOMATION_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.CURSOR_AUTOMATION_WEBHOOK_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPOSITORY: ${{ github.repository }}
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          set -euo pipefail

          jq -n \
            --arg event "github.issue.labeled" \
            --arg label "${LABEL_NAME}" \
            --argjson issue_number "${ISSUE_NUMBER}" \
            --arg issue_url "${ISSUE_URL}" \
            --arg issue_title "${ISSUE_TITLE}" \
            --arg issue_body "${ISSUE_BODY}" \
            --arg repository "${REPOSITORY}" \
            '{
              event: $event,
              label: $label,
              issue_number: $issue_number,
              issue_url: $issue_url,
              issue_title: $issue_title,
              issue_body: $issue_body,
              repository: $repository,
              title: $issue_title,
              body: $issue_body
            }' > /tmp/payload.json

          echo "Posting webhook payload for issue #${ISSUE_NUMBER} (${REPOSITORY})"
          cat /tmp/payload.json

          http_code="$(
            curl -sS -w '%{http_code}' -o /tmp/webhook-response.txt -X POST "${WEBHOOK_URL}" \
              -H "Authorization: Bearer ${WEBHOOK_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @/tmp/payload.json
          )"

          echo "Webhook response (${http_code}):"
          cat /tmp/webhook-response.txt

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Cursor Automation webhook returned HTTP ${http_code}"
            exit 1
          fi
