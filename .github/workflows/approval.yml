name: PR Approval Handler

on:
  issue_comment:
    types: [created]

jobs:
  handle-comment:
    if: github.event.issue.pull_request != null
    runs-on: ubuntu-latest

    steps:
      - name: Check authorized user
        if: github.event.comment.user.login != 'nkhippo'
        run: |
          echo "Unauthorized user. Skipping."
          exit 0

      - name: Merge on approve
        if: |
          github.event.comment.user.login == 'nkhippo' &&
          contains(github.event.comment.body, 'approve')
        run: |
          PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          gh pr merge "$PR_NUMBER" \
            --squash \
            --delete-branch \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Handle revision request
        if: |
          github.event.comment.user.login == 'nkhippo' &&
          (contains(github.event.comment.body, '修正依頼') || contains(github.event.comment.body, '修正:') || contains(github.event.comment.body, '修正：'))
        run: |
          PR_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          gh pr edit "$PR_NUMBER" \
            --add-label "revision-requested" \
            --remove-label "waiting-for-review" \
            --repo ${{ github.repository }}
          gh pr comment "$PR_NUMBER" \
            --body "🔄 修正依頼を受け付けました。Cursor が対応します。" \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
