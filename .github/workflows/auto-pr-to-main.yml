name: Auto PR develop → main

on:
  pull_request:
    types: [closed]
    branches:
      - develop

jobs:
  create-pr:
    if: |
      github.event.pull_request.merged == true &&
      (contains(github.event.pull_request.labels.*.name, 'feature') ||
       contains(github.event.pull_request.labels.*.name, 'bug'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check for existing PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --base main --head develop \
            --state open --json number \
            --jq '.[0].number' \
            --repo ${{ github.repository }})
          echo "existing=$EXISTING" >> "$GITHUB_OUTPUT"

      - name: Create PR if not exists
        if: steps.check.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head develop \
            --title "release: develop → main（$(date +'%Y-%m-%d')）" \
            --label "release" \
            --body "## 概要
develop ブランチの変更を main にマージします。

## マージ前の確認
- [ ] Staging（develop）環境での動作確認が完了している
- [ ] CI が全て通過している

## 承認方法
このコメントに \`approve\` / \`ok\` / \`lgtm\` / 👍 / ✅ のいずれかをコメントすると自動マージされます。
複数の feature を develop に積んでからまとめて承認することも可能です。" \
            --repo ${{ github.repository }}
