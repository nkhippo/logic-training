name: Develop to Main Conflict Check

on:
  push:
    branches: [develop]

permissions:
  contents: read
  issues: write

jobs:
  check-conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect merge conflicts with main
        id: conflict
        run: |
          git fetch origin main develop
          git checkout -B _merge-check origin/develop

          set +e
          git merge origin/main --no-commit --no-ff >/dev/null 2>&1
          merge_exit=$?
          set -e

          if [ "$merge_exit" -ne 0 ]; then
            echo "has_conflict=true" >> "$GITHUB_OUTPUT"
            git diff --name-only --diff-filter=U | sort -u | tee conflict-files.txt
            git merge --abort >/dev/null 2>&1 || git reset --hard origin/develop
          else
            echo "has_conflict=false" >> "$GITHUB_OUTPUT"
            git reset --hard origin/develop
          fi

      - name: Skip when no conflicts
        if: steps.conflict.outputs.has_conflict != 'true'
        run: echo "No conflicts between develop and main."

      - name: Notify conflict via GitHub Issue
        if: steps.conflict.outputs.has_conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = '⚠️ develop→main コンフリクトが検出されました';
            const runbookUrl = `https://github.com/${owner}/${repo}/blob/main/docs/dev-flow-runbook.md#リリースdevelop--main前チェック`;

            const conflictFiles = fs.existsSync('conflict-files.txt')
              ? fs.readFileSync('conflict-files.txt', 'utf8').trim().split('\n').filter(Boolean)
              : [];
            const fileList = conflictFiles.length
              ? conflictFiles.map((f) => `- ${f}`).join('\n')
              : '- （ファイル一覧の取得に失敗しました）';

            const body = `## コンフリクト検出

            develop ブランチを main にマージしようとするとコンフリクトが発生します。

            **検出コミット**: ${context.sha}
            **検出時刻**: ${new Date().toISOString()}

            ### コンフリクトが発生しているファイル
            ${fileList}

            ## 対処手順

            [docs/dev-flow-runbook.md — リリース（develop → main）前チェック](${runbookUrl}) を参照してください。

            \`\`\`bash
            git checkout develop && git pull origin develop
            git merge origin/main
            # コンフリクト解消後
            git push origin develop
            \`\`\`

            ## 自動クローズ

            コンフリクト解消後、develop への push が成功したら本 Issue を手動でクローズしてください。`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'chore',
              per_page: 100,
            });

            const existing = openIssues.find((issue) =>
              issue.title.includes('develop→main コンフリクト')
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `${body}\n\n---\n_再検知: develop-main-conflict-check.yml_`,
              });
              core.info(`Updated existing conflict issue #${existing.number}`);
              return;
            }

            const { data: created } = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['chore'],
            });
            core.info(`Created conflict issue #${created.number}`);
