name: Visual Regression Test

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  deployments: read
  statuses: read
  checks: read

jobs:
  visual-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Wait for Vercel Preview
        id: vercel
        continue-on-error: true
        run: node scripts/wait-for-vercel-preview.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_DEPLOYMENT_SHA: ${{ github.event.pull_request.head.sha }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          MAX_TIMEOUT: '120'

      - name: Run visual tests (Vercel Preview)
        if: steps.vercel.outcome == 'success'
        run: npm run test:visual
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Run visual tests (local preview fallback)
        if: steps.vercel.outcome != 'success'
        run: npm run test:visual
        env:
          VITE_API_BASE_URL: https://thinkgrindai-staging.up.railway.app

      - name: Checkout screenshots branch (baseline)
        uses: actions/checkout@v4
        with:
          ref: screenshots
          path: screenshots-baseline

      - name: Compare screenshots
        run: node scripts/compare-screenshots.js

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'screenshots-diff/report.json';
            if (!fs.existsSync(reportPath)) {
              core.setFailed('Report file not found');
              return;
            }
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const target = '${{ steps.vercel.outcome }}' === 'success'
              ? 'Vercel Preview'
              : 'CI local preview (fallback)';
            const lines = ['## 📸 Visual Regression Report', '', `対象: ${target}`, ''];
            for (const page of report.pages) {
              const icon = page.diffPercent === 0 ? '✅' : '⚠️';
              lines.push(`${icon} \`${page.name}\` — 差分: ${page.diffPercent}%`);
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n'),
            });

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-diff
          path: screenshots-diff/

  update-baseline:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Capture baseline screenshots
        run: npm run test:visual
        env:
          VITE_API_BASE_URL: https://thinkgrindai-staging.up.railway.app

      - name: Update screenshots branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp -r screenshots /tmp/new-screenshots
          git fetch origin screenshots
          git checkout screenshots
          mkdir -p screenshots
          cp /tmp/new-screenshots/*.png screenshots/
          git add screenshots/
          if git diff --staged --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -m "chore: update baseline screenshots [skip ci]"
            git push origin screenshots
          fi
