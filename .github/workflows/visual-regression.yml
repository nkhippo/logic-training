name: Visual Regression Test

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  deployments: read
  statuses: read
  checks: read

jobs:
  visual-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Wait for Vercel Preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: vercel_preview
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 120

      - name: Run visual tests
        run: npm run test:visual
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel_preview.outputs.url }}

      - name: Checkout screenshots branch (baseline)
        uses: actions/checkout@v4
        with:
          ref: screenshots
          path: screenshots-baseline

      - name: Compare screenshots
        run: node scripts/compare-screenshots.js

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'screenshots-diff/report.json';
            if (!fs.existsSync(reportPath)) {
              core.setFailed('Report file not found');
              return;
            }
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const lines = ['## 📸 Visual Regression Report', ''];
            for (const page of report.pages) {
              const icon = page.diffPercent === 0 ? '✅' : '⚠️';
              lines.push(`${icon} \`${page.name}\` — 差分: ${page.diffPercent}%`);
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n'),
            });

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-diff
          path: screenshots-diff/

  update-baseline:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Capture baseline screenshots
        run: npm run test:visual

      - name: Update screenshots branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp -r screenshots /tmp/new-screenshots
          git fetch origin screenshots
          git checkout screenshots
          mkdir -p screenshots
          cp /tmp/new-screenshots/*.png screenshots/
          git add screenshots/
          if git diff --staged --quiet; then
            echo "No screenshot changes to commit"
          else
            git commit -m "chore: update baseline screenshots [skip ci]"
            git push origin screenshots
          fi
