<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>思考トレーニング | thinkgrindai</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
  <div class="app" id="thinking-app">

    <!-- ヘッダー -->
    <div class="app-header no-print">
      <div class="app-header-main">
        <span class="app-header-brand">thinkgrindai</span>
        <h1 id="ui-thinking-title">思考トレーニング</h1>
        <nav class="app-header-nav" aria-label="ページナビゲーション">
          <button type="button" class="app-header-link no-print" onclick="openThinkingGuide()">
            <span id="ui-thinking-guide-btn">ガイド？</span>
          </button>
          <a class="app-header-link" href="logic.html" id="link-to-logic">← 論理トレーニング</a>
        </nav>
      </div>
      <div class="app-header-actions">
        <button type="button" class="header-action-btn no-print" id="persona-setting-btn" onclick="openPersonaModal()">
          <span id="ui-profile-btn">プロフィール</span>
          <span id="persona-active-badge" class="persona-active-badge" style="display:none;">設定中</span>
        </button>
        <button type="button" class="header-action-btn no-print" id="lang-open-btn" onclick="openLangModal()">
          <span id="ui-lang-btn">言語</span>
        </button>
      </div>
    </div>

    <!-- サブタブ -->
    <div class="sub-tabs no-print" style="margin:0;border-bottom:.5px solid var(--border);">
      <button class="sub-tab active" id="thinking-sub-new" onclick="switchThinkingSub('new')">
        <i class="ti ti-plus"></i> <span id="ui-thinking-new">新規生成</span>
      </button>
      <button class="sub-tab" id="thinking-sub-past" onclick="switchThinkingSub('past')">
        <i class="ti ti-history"></i> <span id="ui-thinking-past">過去問</span>
      </button>
    </div>

    <!-- 新規生成エリア -->
    <div id="thinking-new-area">
      <div class="card no-print">

        <!-- 問いの核心（任意） -->
        <div style="margin-bottom:12px;">
          <label style="font-size:13px;font-weight:500;display:block;margin-bottom:8px;"
                 id="ui-thinking-core-lbl">問いの核心（任意）</label>
          <div id="thinking-core-row" class="preset-row" style="flex-wrap:wrap;"></div>
        </div>

        <!-- 業界（任意） -->
        <div style="margin-bottom:12px;">
          <label style="font-size:13px;font-weight:500;display:block;margin-bottom:8px;"
                 id="ui-thinking-industry-lbl">業界（任意）</label>
          <div id="thinking-industry-row" class="industry-preset-row" style="flex-wrap:wrap;"></div>
        </div>

        <!-- 難易度 -->
        <label style="font-size:13px;font-weight:500;display:block;margin-bottom:8px;"
               id="ui-thinking-diff-lbl">難易度</label>
        <div class="diff-row" id="thinking-diff-row">
          <button class="diff-btn" data-d="1" onclick="setThinkingDiff(1)">★☆☆☆☆<br><span class="dlbl" id="thd1"></span></button>
          <button class="diff-btn" data-d="2" onclick="setThinkingDiff(2)">★★☆☆☆<br><span class="dlbl" id="thd2"></span></button>
          <button class="diff-btn" data-d="3" onclick="setThinkingDiff(3)">★★★☆☆<br><span class="dlbl" id="thd3"></span></button>
          <button class="diff-btn" data-d="4" onclick="setThinkingDiff(4)">★★★★☆<br><span class="dlbl" id="thd4"></span></button>
          <button class="diff-btn" data-d="5" onclick="setThinkingDiff(5)">★★★★★<br><span class="dlbl" id="thd5"></span></button>
        </div>
        <div class="diff-desc" id="thinking-diff-desc"></div>

        <!-- レベル（難易度3以上のみ表示） -->
        <div id="thinking-level-block" style="display:none;margin-top:12px;">
          <label style="font-size:13px;font-weight:500;display:block;margin-bottom:8px;"
                 id="ui-thinking-level-lbl">レベル</label>
          <div id="thinking-level-row" class="preset-row" style="flex-wrap:wrap;"></div>
          <div class="diff-desc" id="thinking-level-desc" style="margin-top:6px;"></div>
        </div>

        <!-- 生成ボタン -->
        <button class="btn" id="thinking-gen-btn" onclick="generateThinking()" style="margin-top:12px;">
          <span id="ui-thinking-gen-btn">問題を生成する</span>
        </button>
        <div id="thinking-gen-loading" style="display:none;" class="gen-loading" aria-live="polite">
          <span class="spinner" aria-hidden="true"></span>
          <span id="ui-thinking-gen-loading">問題を生成中...</span>
        </div>
      </div>

      <!-- 問題表示エリア -->
      <div id="thinking-result" style="display:none;">
        <div id="thinking-meta-row" class="problem-meta-row"></div>

        <!-- 状況 -->
        <p class="slabel no-print" id="ui-thinking-situation-lbl">状況</p>
        <div class="problem-box" id="thinking-situation"></div>

        <!-- 回答エリア（レベルに応じてJSで動的生成） -->
        <div id="thinking-steps"></div>

        <!-- フィードバックエリア -->
        <div id="thinking-feedback"></div>

        <!-- 振り返りエリア -->
        <div id="thinking-reflection" style="display:none;"></div>
      </div>
    </div>

    <!-- 過去問エリア -->
    <div id="thinking-past-area" class="no-print" style="display:none;">
      <div id="thinking-past-list-view">
        <div class="ssync" style="margin-bottom:.75rem;">
          <div class="sdot" id="thinking-past-dot"></div>
          <span id="thinking-past-lbl">—</span>
        </div>
        <div class="plist" id="thinking-past-list"></div>
      </div>
      <div id="thinking-past-play" style="display:none;">
        <button class="back-btn" onclick="closeThinkingPast()">
          <i class="ti ti-arrow-left"></i>
          <span id="ui-thinking-back">一覧に戻る</span>
        </button>
        <div id="thinking-past-content"></div>
      </div>
    </div>

    <!-- 言語選択モーダル -->
    <div class="guide-overlay no-print" id="lang-overlay"
         onclick="if(event.target===this)closeLangModal()">
      <div class="guide-modal" role="dialog" aria-modal="true" aria-labelledby="ui-lang-modal-title" style="max-width:360px;">
        <div class="guide-modal-header">
          <span class="guide-modal-title" id="ui-lang-modal-title">言語</span>
          <button type="button" class="guide-close-btn" onclick="closeLangModal()" aria-label="閉じる">×</button>
        </div>
        <div class="guide-body lang-modal-body">
          <p id="ui-lang-modal-desc" class="lang-modal-desc">表示言語を選択してください。</p>
          <div class="lang-modal-choices">
            <button type="button" class="lang-choice-btn" id="lang-choice-ja" onclick="selectLangFromModal('ja')">日本語</button>
            <button type="button" class="lang-choice-btn" id="lang-choice-en" onclick="selectLangFromModal('en')">English</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ペルソナ設定モーダル -->
    <div class="guide-overlay no-print" id="persona-overlay"
         onclick="if(event.target===this)closePersonaModal()">
      <div class="guide-modal" role="dialog" aria-modal="true" style="max-width:520px;">
        <div class="guide-modal-header">
          <span class="guide-modal-title">👤 <span id="ui-persona-title">ペルソナ設定</span></span>
          <button type="button" class="guide-close-btn" onclick="closePersonaModal()" aria-label="閉じる">×</button>
        </div>
        <div class="guide-body" style="padding:1.25rem;">
          <p id="ui-persona-desc" style="font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.7;"></p>
          <div style="margin-bottom:1.25rem;">
            <label style="font-size:13px;font-weight:500;display:block;margin-bottom:8px;" id="ui-persona-industry-lbl">業界 × 職種（最大3つ）</label>
            <div id="persona-rows"></div>
            <button type="button" class="btn btn-sm" id="persona-add-btn" onclick="addPersonaRow()"
              style="margin-top:8px;font-size:12px;padding:4px 12px;">
              <span id="ui-persona-add-btn">＋ 追加</span>
            </button>
          </div>
          <div style="margin-bottom:1.25rem;">
            <label style="font-size:13px;font-weight:500;display:block;margin-bottom:8px;" id="ui-persona-tenure-lbl">勤続年数（最も長い職歴）</label>
            <select id="persona-tenure"
              style="width:100%;padding:8px 10px;border:.5px solid var(--border2);border-radius:var(--r-md);font-size:13px;background:var(--bg2);color:var(--text);"
              onchange="updateTenureDesc()">
            </select>
            <p id="persona-tenure-desc" style="font-size:12px;color:var(--text2);margin-top:6px;"></p>
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button type="button" class="btn btn-sm" onclick="clearPersona()"
              style="background:var(--bg2);color:var(--text2);border:.5px solid var(--border2);">
              <span id="ui-persona-clear-btn">クリア</span>
            </button>
            <button type="button" class="btn" onclick="savePersona()">
              <span id="ui-persona-save-btn">保存</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ガイドモーダル -->
    <div class="guide-overlay no-print" id="thinking-guide-overlay"
         onclick="if(event.target===this)closeThinkingGuide()">
      <div class="guide-modal" role="dialog" aria-modal="true">
        <div class="guide-modal-header">
          <span class="guide-modal-title" id="thinking-guide-title">ガイド</span>
          <button class="guide-close-btn" onclick="closeThinkingGuide()" aria-label="閉じる">×</button>
        </div>
        <div class="guide-body" id="thinking-guide-body"></div>
      </div>
    </div>

    <!-- トースト -->
    <div class="toast" id="thinking-toast" role="status" aria-live="polite"></div>

  </div><!-- /.app -->

  <!-- shared -->
  <script src="js/shared/01-config.js" defer></script>
  <script src="js/shared/01-config.local.js" defer onerror="void 0"></script>
  <script src="js/shared/02-i18n.js" defer></script>
  <script src="js/shared/03-state.js" defer></script>
  <script src="js/shared/04-industry-persona.js" defer></script>
  <script src="js/shared/06-utils-md.js" defer></script>
  <script src="js/shared/07-api.js" defer></script>
  <script src="js/shared/08-migrate.js" defer></script>
  <script src="js/shared/09-persona.js" defer></script>
  <script src="js/shared/10-preset-ui.js" defer></script>
  <script src="js/shared/11-gas-past.js" defer></script>
  <script src="js/shared/12-lang.js" defer></script>
  <script src="js/shared/13-persona-modal.js" defer></script>
  <!-- thinking -->
  <script src="js/thinking/domain.js" defer></script>
  <script src="js/thinking/app.js" defer></script>
</body>
</html>
