<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>論理トレーニング Ver.2.2 / Logic Training</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
@media print {
  .no-print{display:none!important;}
  body{background:#fff!important;padding:0!important;}
  .app{max-width:100%!important;}
  .problem-box{background:#fff!important;border:1px solid #aaa!important;font-size:13pt!important;line-height:2.2!important;}
  .blank{border:1px solid #333!important;background:#fff!important;min-width:80px!important;}
  .print-header{display:block!important;}
  .summary-block-print{display:block!important;}
  @page{size:A4;margin:18mm 14mm;}
}
.print-header{display:none;margin-bottom:1.5rem;}
.print-header h2{font-size:14pt;font-weight:bold;margin-bottom:.4rem;}
.print-header p{font-size:10pt;color:#555;margin-bottom:.2rem;}
.summary-block-print{display:none;}
:root{
  --bg:#fdf8f2;--bg2:#f5ede0;--bg3:#e8d9c4;
  --text:#2c1f0e;--text2:#8a7060;
  --border:rgba(120,80,40,0.15);--border2:rgba(120,80,40,0.32);
  --green:#2d7a5c;--green-bg:#e6f4ee;--green-text:#1a4d38;
  --purple:#6b5fc7;--amber:#c8813a;--r-md:8px;--r-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg3);color:var(--text);display:flex;justify-content:center;padding:2rem 1rem 5rem;min-height:100vh;}
.app{width:100%;max-width:700px;}
.app-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;}
.app-header h1{font-size:20px;font-weight:500;margin-bottom:.15rem;}
.lang-sw{display:flex;border:.5px solid var(--border2);border-radius:var(--r-md);overflow:hidden;flex-shrink:0;}
.lang-btn{padding:6px 12px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;white-space:nowrap;}
.lang-btn.active{background:var(--bg2);color:var(--text);}
.lang-btn:first-child{border-right:.5px solid var(--border2);}
.api-bar{background:var(--bg);border:.5px solid var(--border2);border-radius:var(--r-lg);padding:1rem 1.25rem;margin-bottom:1rem;}
.api-bar-header{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text2);user-select:none;}
.api-bar-status{font-size:12px;color:var(--green);flex:1;}
.api-bar-body{overflow:hidden;transition:max-height .25s ease,opacity .2s ease;max-height:200px;opacity:1;}
.api-bar-body.collapsed{max-height:0;opacity:0;}
.api-bar-chevron.collapsed{transform:rotate(-90deg);}
.api-row{display:flex;gap:8px;align-items:center;}
.api-bar input[type=password]{flex:1;padding:8px 10px;border:.5px solid var(--border2);border-radius:var(--r-md);font-size:13px;background:var(--bg2);color:var(--text);}
.api-save-btn{padding:7px 12px;border:.5px solid var(--border2);border-radius:var(--r-md);background:transparent;cursor:pointer;font-size:12px;color:var(--text2);white-space:nowrap;}
.api-save-btn:hover{background:var(--bg2);}
.api-note{font-size:12px;color:var(--text2);margin-top:8px;}
.api-note a{color:var(--text2);}
.api-bar.flash-saved{border-color:var(--green);box-shadow:0 0 0 2px rgba(45,122,92,.18);transition:border-color .3s,box-shadow .3s;}
.api-save-btn.saved{background:var(--green-bg);border-color:var(--green);color:var(--green-text);}
.btn.needs-apikey{opacity:.45;cursor:not-allowed;}
.sub-tabs{display:flex;gap:0;border-bottom:1.5px solid var(--border2);margin-bottom:1.25rem;width:100%;}
.sub-tab{flex:1;justify-content:center;padding:10px 4px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.sub-tab.active{color:var(--text);border-bottom-color:var(--purple);}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;}
.tab{flex:1;padding:9px 4px;border:.5px solid var(--border2);border-radius:var(--r-md);background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);text-align:center;transition:all .15s;}
.tab.active{background:var(--bg2);color:var(--text);}
.panel{display:none;}.panel.active{display:block;}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;margin-bottom:1rem;}
label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:500px){.row2{grid-template-columns:1fr;}}
input[type=number],input[type=text],textarea{width:100%;padding:8px 10px;border:.5px solid var(--border2);border-radius:var(--r-md);font-size:14px;background:var(--bg2);color:var(--text);font-family:inherit;}
textarea{resize:vertical;}
.btn{width:100%;padding:10px;background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--r-md);font-size:14px;font-weight:500;cursor:pointer;color:var(--text);transition:background .15s;}
.btn:hover{background:var(--bg3);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-icon{width:auto;padding:8px 14px;font-size:13px;display:inline-flex;align-items:center;gap:6px;}
.btn-sm{width:auto;padding:6px 12px;font-size:12px;}
.btn-outline{background:transparent;}
.diff-row{display:flex;gap:5px;margin-bottom:10px;}
.diff-btn{flex:1;padding:7px 2px;border:.5px solid var(--border2);border-radius:var(--r-md);background:transparent;cursor:pointer;font-size:11px;color:var(--text2);text-align:center;line-height:1.6;transition:all .15s;}
.diff-btn[data-d="1"].sel{background:#eaf5e6;border-color:#4a9e5c;color:#1f5c2a;}
.diff-btn[data-d="2"].sel{background:#e6f4ee;border-color:#2d7a5c;color:#1a4d38;}
.diff-btn[data-d="3"].sel{background:#e8eef9;border-color:#4a6db5;color:#1e3d7a;}
.diff-btn[data-d="4"].sel{background:#fdf0e0;border-color:#c8813a;color:#7a4010;}
.diff-btn[data-d="5"].sel{background:#fce8e8;border-color:#c0453a;color:#701510;}
.diff-desc{font-size:12px;color:var(--text2);margin-bottom:12px;padding:6px 10px;background:var(--bg2);border-radius:var(--r-md);line-height:1.5;}
.auto-info{font-size:12px;color:var(--amber);margin-bottom:12px;padding:5px 10px;background:#fdf5e6;border:.5px solid var(--amber);border-radius:var(--r-md);}
.problem-box{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-md);padding:1.25rem;font-size:15px;line-height:2.1;margin-bottom:1rem;white-space:pre-wrap;word-break:break-all;}
.blank{display:inline-block;background:var(--bg);border:.5px solid var(--border2);border-radius:4px;width:5.5em;min-width:5.5em;max-width:5.5em;text-align:center;padding:2px 4px;font-size:13px;color:var(--text2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;vertical-align:middle;margin:0 2px;transition:color .15s,background .15s;}
.blank.filled{color:var(--text);background:var(--bg2);border-color:var(--purple);}
.volume-row{display:flex;gap:8px;}
.vol-btn{flex:1;padding:10px 6px;border:.5px solid var(--border2);border-radius:var(--r-md);background:transparent;cursor:pointer;text-align:center;font-size:13px;font-weight:500;color:var(--text2);display:flex;flex-direction:column;gap:3px;transition:all .15s;}
.vol-btn.active{background:var(--bg2);color:var(--text);border-color:var(--purple);}
.vol-chars{font-size:11px;color:var(--text2);}
.theme-mode-toggle{display:flex;gap:0;border:.5px solid var(--border2);border-radius:var(--r-md);overflow:hidden;margin-bottom:8px;width:fit-content;}
.mode-btn{padding:5px 16px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;}
.mode-btn.active{background:var(--bg2);color:var(--text);}
.mode-btn:first-child{border-right:.5px solid var(--border2);}
.gen-loading{display:flex;align-items:center;gap:10px;padding:.75rem 0;color:var(--text2);font-size:14px;}
.gen-loading .spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:gen-spin .7s linear infinite;flex-shrink:0;}

.answer-section{display:grid;gap:8px;margin-bottom:1rem;}
.answer-item{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.answer-row{display:flex;align-items:center;gap:10px;}
.answer-row label{margin:0;min-width:46px;font-size:13px;white-space:nowrap;}
.answer-row input{flex:1;}
.hint-text{font-size:11px;color:var(--text2);padding-left:54px;line-height:1.4;}
.feedback-box{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r-md);padding:1.25rem;font-size:14px;line-height:1.85;margin-top:1rem;}
.feedback-box h2{font-size:16px;font-weight:600;margin:1.2rem 0 .5rem;padding-bottom:.35rem;border-bottom:.5px solid var(--border);}
.feedback-box h2:first-child{margin-top:0;}
.feedback-box h3{font-size:15px;font-weight:500;margin:1.1rem 0 .45rem;padding-bottom:.3rem;border-bottom:.5px solid var(--border);}
.feedback-box h3:first-child{margin-top:0;}
.feedback-box h4{font-size:14px;font-weight:500;margin:.9rem 0 .35rem;color:var(--text);}
.feedback-box hr{border:none;border-top:.5px solid var(--border2);margin:1rem 0;}
.feedback-box table.md-table{width:100%;border-collapse:collapse;margin:.85rem 0 1rem;font-size:13px;line-height:1.6;}
.feedback-box table.md-table th,.feedback-box table.md-table td{border:.5px solid var(--border2);padding:7px 10px;text-align:left;vertical-align:top;}
.feedback-box table.md-table th{background:var(--bg2);font-weight:500;white-space:nowrap;}
.feedback-box table.md-table tr:nth-child(even) td{background:rgba(255,255,255,.35);}
.feedback-box p{margin-bottom:.55rem;}
.feedback-box ol,.feedback-box ul{padding-left:1.4rem;margin-bottom:.55rem;}
.feedback-box li{margin-bottom:.3rem;}
.feedback-box strong{font-weight:500;}
.ok{color:var(--green);font-weight:500;}
.ng{color:#c0453a;font-weight:500;}
.completed-text{background:var(--green-bg);border:.5px solid var(--green);border-radius:var(--r-md);padding:1rem 1.25rem;margin-top:.5rem;font-size:14px;line-height:2.1;color:var(--green-text);}
.step-bar{display:flex;gap:6px;margin-bottom:1rem;}
.step{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s;}
.step.done{background:var(--green);}
.step.active{background:var(--purple);}
.action-bar{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;}
.loading{color:var(--text2);font-size:14px;padding:.75rem 0;}
.dots::after{content:'.';animation:dots 1.2s steps(3,end) infinite;}
@keyframes dots{0%,20%{content:'.'}40%{content:'..'}80%,100%{content:'...'}}
.gen-status{margin-top:12px;padding:12px 14px;background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--r-md);}
.gen-status-hd{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;}
.gen-spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:gen-spin .7s linear infinite;flex-shrink:0;}
@keyframes gen-spin{to{transform:rotate(360deg);}}
.gen-steps{list-style:none;display:grid;gap:6px;}
.gen-step{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);transition:color .2s;}
.gen-step.active{color:var(--text);font-weight:500;}
.gen-step.done{color:var(--green);}
.gen-step-mark{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1;}
.gen-step.active .gen-step-mark{border-color:var(--purple);border-top-color:transparent;border-width:2px;animation:gen-spin .7s linear infinite;background:transparent;}
.gen-step.done .gen-step-mark{border-color:var(--green);background:var(--green);color:#fff;}
.gen-step.done .gen-step-mark::after{content:'✓';}
.btn.is-loading{opacity:.65;cursor:wait;}
.app.is-busy .pcard{cursor:not-allowed;}
.completed-text .conj strong{color:var(--purple);font-weight:600;}
.completed-text .conj-role{font-size:.85em;color:var(--amber);font-weight:500;margin-left:1px;}
.err{color:#c0453a;font-size:14px;padding:.5rem 0;}
.slabel{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px;}
.theme-tag{display:inline-block;font-size:12px;background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--r-md);padding:3px 10px;margin-bottom:10px;color:var(--text2);}
.mode-bar{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-md);padding:.6rem 1rem;font-size:13px;color:var(--text2);margin-bottom:.75rem;display:flex;align-items:center;gap:8px;}
.mode-bar strong{color:var(--text);}
.sum-block,.sum-q-block{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;margin-bottom:1rem;}
.sum-block-lbl,.sum-q-lbl{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:.5rem;}
.q-type-badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:var(--r-md);background:var(--bg2);border:.5px solid var(--border2);color:var(--text2);margin-left:6px;vertical-align:middle;}
.sum-src{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-md);padding:1rem;font-size:14px;line-height:1.9;margin-bottom:.75rem;}
.sum-q-text{font-size:14px;line-height:1.85;margin-bottom:.75rem;}
.sum-ta{width:100%;border:.5px solid var(--border2);border-radius:var(--r-md);padding:10px;font-size:14px;background:var(--bg2);color:var(--text);font-family:inherit;resize:vertical;line-height:1.7;transition:border-color .15s;}
.sum-ta.overlimit{border-color:#c0453a!important;}
.cc{font-size:12px;text-align:right;margin-top:3px;color:var(--text2);}
.cc.over{color:#c0453a;font-weight:500;}
.cc.ok2{color:var(--green);}
.owarn{font-size:12px;color:#c0453a;margin-top:4px;display:none;}
.owarn.show{display:block;}
.review-toggle{display:flex;align-items:center;gap:6px;width:100%;margin:0 0 10px;padding:8px 10px;border:.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg2);color:var(--text2);font-size:13px;cursor:pointer;text-align:left;}
.review-toggle:hover{color:var(--text);border-color:var(--border);}
.review-toggle-icon{font-size:10px;line-height:1;transition:transform .15s;}
.review-premise-body{margin-bottom:1rem;padding:0 2px;}
.review-premise-body[hidden]{display:none!important;}
.review-field{margin-bottom:.85rem;}
.review-field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px;}
.review-images-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:8px;}
.review-img-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.review-img-thumb{position:relative;width:72px;height:72px;border-radius:var(--r-md);overflow:hidden;border:.5px solid var(--border2);background:var(--bg2);}
.review-img-thumb img{width:100%;height:100%;object-fit:cover;}
.review-img-thumb button{position:absolute;top:2px;right:2px;width:20px;height:20px;border:none;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:12px;line-height:1;cursor:pointer;padding:0;}
.review-required::after{content:' *';color:#c0453a;font-weight:500;}
.past-section{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;margin-top:1rem;}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:.85rem;}
.ph-title{font-size:15px;font-weight:500;}
.pf-tabs{display:flex;gap:5px;margin-bottom:.75rem;flex-wrap:wrap;}
.pf-tab{padding:5px 10px;border:.5px solid var(--border2);border-radius:var(--r-md);background:transparent;cursor:pointer;font-size:11px;color:var(--text2);white-space:nowrap;}
.pf-tab.active{background:var(--bg2);color:var(--text);font-weight:500;}
.ptoolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;}
.ssync{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.sdot.ok{background:var(--green);}
.sdot.err{background:#c0453a;}
.sdot.spin{background:var(--amber);animation:pulse .8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.plist{display:grid;gap:8px;}
.pempty{text-align:center;padding:2rem 1rem;color:var(--text2);font-size:13px;line-height:1.8;}
.pcard{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-md);padding:.85rem 1rem;cursor:pointer;transition:border-color .15s;}
.pcard:hover{border-color:var(--border2);}
.pc-h{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px;}
.pc-t{font-size:13px;font-weight:500;}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:var(--r-md);}
.b1{background:#eaf5e6;color:#1f5c2a;}.b2{background:#e6f4ee;color:#1a4d38;}
.b3{background:#e8eef9;color:#1e3d7a;}.b4{background:#fdf0e0;color:#7a4010;}.b5{background:#fce8e8;color:#701510;}
.pc-pre{font-size:12px;color:var(--text2);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.pc-date{font-size:11px;color:var(--text2);margin-top:4px;}
.pc-m{display:flex;gap:5px;align-items:center;}
.pcdel{padding:3px 7px;font-size:11px;color:var(--text2);background:transparent;border:.5px solid var(--border2);border-radius:var(--r-md);cursor:pointer;flex-shrink:0;}
.pcdel:hover{color:#c0453a;border-color:#c0453a;}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);cursor:pointer;background:none;border:none;padding:0;margin-bottom:1rem;}
.back-btn:hover{color:var(--text);}
.divider{height:.5px;background:var(--border);margin:1rem 0;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--bg);border:.5px solid var(--border2);border-radius:var(--r-lg);padding:.75rem 1.25rem;font-size:13px;box-shadow:0 4px 20px rgba(80,40,10,.15);display:none;z-index:999;max-width:380px;text-align:center;line-height:1.6;}
.toast.show{display:block;}
</style>
</head>
<body>
<div class="app">
  <div class="app-header no-print">
    <div>
      <h1 id="ui-app-title">論理トレーニング</h1>
    </div>
    <div class="lang-sw">
      <button class="lang-btn active" onclick="setLang('ja')">日本語</button>
      <button class="lang-btn" onclick="setLang('en')">English</button>
    </div>
  </div>

  <div class="api-bar no-print" id="api-bar">
    <div class="api-bar-header" onclick="toggleApiBar()">
      <span id="ui-api-lbl">Claude APIキー</span>
      <span class="api-bar-status" id="api-bar-status"></span>
      <i class="ti ti-chevron-down api-bar-chevron" id="api-bar-chevron"
         style="font-size:14px;color:var(--text2);transition:transform .2s;"></i>
    </div>
    <div class="api-bar-body" id="api-bar-body">
      <div class="api-row" style="margin-top:10px;">
        <input type="password" id="apikey" placeholder="sk-ant-..." autocomplete="current-password"/>
        <button class="api-save-btn" onclick="saveApiKey()">
          <i class="ti ti-device-floppy"></i>
          <span id="ui-save-btn">保存</span>
        </button>
      </div>
      <p class="api-note">
        <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
        → API Keys
      </p>
    </div>
  </div>

  <div class="tabs no-print">
    <button class="tab active" onclick="switchTab('fill')"><i class="ti ti-puzzle"></i> <span id="ui-tab-fill">穴埋め</span></button>
    <button class="tab" onclick="switchTab('summary')"><i class="ti ti-align-left"></i> <span id="ui-tab-sum">要約</span></button>
    <button class="tab" onclick="switchTab('review')"><i class="ti ti-checklist"></i> <span id="ui-tab-review">校閲</span></button>
  </div>

  <!-- 穴埋め -->
  <div id="fill-panel" class="panel active">
    <div class="sub-tabs no-print" id="fill-sub-tabs">
      <button class="sub-tab active" id="fill-sub-new" onclick="switchSub('fill','new')">
        <i class="ti ti-plus"></i> <span id="ui-f-sub-new">新規生成</span>
      </button>
      <button class="sub-tab" id="fill-sub-past" onclick="switchSub('fill','past')">
        <i class="ti ti-history"></i> <span id="ui-f-sub-past">過去問</span>
      </button>
    </div>
    <div id="fill-new-area">

// ── 穴埋め数 / ブロック数の自動計算 ─────────────────────
// 文字数80%・難易度20%の重みで決定
// 穴埋め数の難易度係数（文字数80%・難易度20%の重み）
// 除数100: 300文字→base3.0、200文字→base2.0
// 係数: 難易度が上がるほど若干増やすが控えめに
const F_COEFF={1:.7,2:.85,3:1.0,4:1.1,5:1.2};
// ブロック数の係数（要約）
const B_COEFF={1:.7,2:.85,3:1.0,4:1.1,5:1.2};
const F_LENGTH={1:200,2:350,3:500,4:700,5:800};
const S_LENGTH_FIXED={1:300,2:400,3:500};
const S_LENGTH_VARIABLE={
  short:{ja:'さくっと',en:'Quick',chars:500},
  mid:{ja:'普通',en:'Normal',chars:2000},
  long:{ja:'じっくり',en:'Deep',chars:4000}
};
function getSummaryLength(diff){
  if(diff<=3) return S_LENGTH_FIXED[diff];
  const vol=st.sVolume||'short';
  return S_LENGTH_VARIABLE[vol].chars;
}
const S_RATIO={1:.6,2:.5,3:.4,4:.3,5:.2};

function calcBlanks(length,diff){
  const base=length/150;
  return Math.min(5,Math.max(2,Math.round(base*F_COEFF[diff])+1));
}
function calcBlocks(length,diff){
  const base=length/200;
  return Math.min(4,Math.max(1,Math.round(base*B_COEFF[diff])));
}
function getSumQuestionTypes(diff){
  if(diff<=2)return ['語句説明','主張要約'];
  if(diff===3)return ['語句説明','主張要約','理由説明'];
  return ['語句説明','主張要約','理由説明','課題抽出','対比説明'];
}
const SUM_TYPE_LABELS={
  ja:{'語句説明':'語句説明','主張要約':'主張要約','理由説明':'理由説明','課題抽出':'課題抽出','対比説明':'対比説明'},
  en:{'語句説明':'Term','主張要約':'Main claim','理由説明':'Reason','課題抽出':'Issue','対比説明':'Contrast'}
};
function normSummaryProb(prob){

  return {...prob,text:prob.text||'',questions};
}
function sumTypeLabel(type,lang){return(SUM_TYPE_LABELS[lang]||SUM_TYPE_LABELS.ja)[type]||type;}
function buildSummaryQuestionHtml(q,i,lang,mode){

function buildSummaryGradePrompt(prob,userTexts){

      :`【設問${q.id||i+1}】タイプ: ${q.type}\n${q.question}\n模範解答の条件: ${q.targetChars}文字以内。内容の正確さ・簡潔さ・表現を評価すること。\n学習者の回答（${n}文字）:\n${ut}`;
  }).join('\n\n---\n\n');

    ?`${passage}\n\n${qs}\n\nGrade each question individually (accuracy, conciseness, expression). Provide a model-answer direction per question.\n\n## Per-Question Evaluation\nFor each question: content accuracy, conciseness, expression, and an improved example within the limit.\n\n## Overall Feedback\nSummarize strengths and areas to improve.`
    :`${passage}\n\n${qs}\n\n文章全体を踏まえ、各設問を個別に採点してください（内容の正確さ・簡潔さ・表現）。\n\n## 設問別評価\n各設問ごとに：内容の正確さ、簡潔さ、表現、改善例（文字数以内）\n\n## 総合講評\n全体の評価と学習アドバイス。`;
  return body+(isEN?SUM_SCORE_NOTE_EN:SUM_SCORE_NOTE_JA);

function lockEl(el,skipIds){
  const skip=Array.isArray(skipIds)?skipIds:[];
  if(skip.includes(el.id)||el.id==='f-gen-btn'||el.id==='s-gen-btn')return;
  if(el.tagName==='BUTTON'||el.tagName==='INPUT'||el.tagName==='TEXTAREA'){
    el.dataset.genWasDisabled=el.disabled?'1':'0';
    el.disabled=true;
  }else{
    el.dataset.genLocked='1';
    el.style.pointerEvents='none';
    el.style.opacity='0.55';
  }
}
function unlockEl(el){
  if(el.dataset.genLocked){
    delete el.dataset.genLocked;
    el.style.pointerEvents='';
    el.style.opacity='';
  }else if(el.dataset.genWasDisabled!==undefined){
    el.disabled=el.dataset.genWasDisabled==='1';
    delete el.dataset.genWasDisabled;
  }
}

// ── md → HTML ─────────────────────────────────────────────
function styleCompletedConj(html){
  return html.replace(/(<div class="completed-text">)([\s\S]*?)(<\/div>)/g,(_,open,inner,close)=>{
    const s=inner.replace(/<strong>([^<]+)<\/strong>\[([^\]]+)\]/g,'<span class="conj"><strong>$1</strong><span class="conj-role">[$2]</span></span>');
    return open+s+close;
  });
}
function mdInline(s){
  return String(s||'')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/✓/g,'<span class="ok">✓</span>')
    .replace(/✗/g,'<span class="ng">✗</span>');
}
function isTableSepRow(line){
  const cells=line.trim().replace(/^\|/,'').replace(/\|$/,'').split('|');
  return cells.length>0&&cells.every(c=>/^:?-{2,}:?$/.test(c.trim()));
}
function parseMdRow(line){
  return line.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>c.trim());
}
function renderMdTable(lines){
  const header=parseMdRow(lines[0]);
  const body=lines.slice(2).map(parseMdRow).filter(r=>r.some(c=>c.length));
  let h='<table class="md-table"><thead><tr>';
  header.forEach(c=>{h+=`<th>${mdInline(c)}</th>`;});
  h+='</tr></thead><tbody>';
  body.forEach(row=>{
    h+='<tr>';
    for(let i=0;i<header.length;i++) h+=`<td>${mdInline(row[i]||'')}</td>`;
    h+='</tr>';
  });
  return h+'</tbody></table>';
}
function parseMdTables(text){
  const lines=text.split('\n');
  const out=[];
  let i=0;
  while(i<lines.length){
    const tr=lines[i].trim();
    if(tr.startsWith('|')&&tr.endsWith('|')){
      const block=[];
      while(i<lines.length){
        const t=lines[i].trim();
        if(!t.startsWith('|')||!t.endsWith('|'))break;
        block.push(t);
        i++;
      }
      if(block.length>=2&&isTableSepRow(block[1])) out.push(renderMdTable(block));
      else out.push(...block);
      continue;
    }
    out.push(lines[i]);
    i++;
  }
  return out.join('\n');
}
function mdWrapTextBlocks(html){
  const re=/(<table[\s\S]*?<\/table>|<hr>|<h2>[\s\S]*?<\/h2>|<h3>[\s\S]*?<\/h3>|<h4>[\s\S]*?<\/h4>|<ul>[\s\S]*?<\/ul>|<div class="completed-text">[\s\S]*?<\/div>)/gi;
  return html.split(re).map(part=>{
    if(!part||/^<(table|hr|h[234]|ul|div)/i.test(part.trim()))return part;
    let p=part.trim();
    if(!p)return '';
    p=mdInline(p).replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>');
    if(p&&!p.startsWith('<p>'))p='<p>'+p;
    if(p&&!p.endsWith('</p>'))p+='</p>';
    return p;
  }).join('');
}
function md2h(tx){
  let raw=String(tx||'').trim();
  if(!raw)return '';
  const blockquotes=[];
  raw=raw.replace(/^> (.+)$/gm,(_,line)=>{
    blockquotes.push('<blockquote>'+esc(line)+'</blockquote>');
    return `\x01BQ${blockquotes.length-1}\x01`;
  });
  let h=esc(raw);
  blockquotes.forEach((bq,i)=>{h=h.replace(`\x01BQ${i}\x01`,bq);});
  h=parseMdTables(h);
  h=h
    .replace(/^#### (.+)$/gm,(_,t)=>'<h4>'+mdInline(t)+'</h4>')
    .replace(/^### (.+)$/gm,(_,t)=>'<h3>'+mdInline(t)+'</h3>')
    .replace(/^## (.+)$/gm,(_,t)=>'<h2>'+mdInline(t)+'</h2>')
    .replace(/^# (.+)$/gm,(_,t)=>'<h2>'+mdInline(t)+'</h2>')
    .replace(/^---+?\s*$/gm,'<hr>')
    .replace(/^\d+\. (.+)$/gm,(_,t)=>'<li>'+mdInline(t)+'</li>')
    .replace(/^[-*・] (.+)$/gm,(_,t)=>'<li>'+mdInline(t)+'</li>')
    .replace(/((?:<li>[\s\S]*?<\/li>\s*)+)/g,'<ul>$1</ul>');
  h=mdWrapTextBlocks(h);
  const blockEnd='(?=<h[234]>|<table|<hr|<ul>|<div class="completed-text"|$)';
  h=h
    .replace(new RegExp('「完全補完文」([\\s\\S]*?)'+blockEnd,'g'),'<div class="completed-text">$1</div>')
    .replace(new RegExp('「Fully Supplemented Text」([\\s\\S]*?)'+blockEnd,'g'),'<div class="completed-text">$1</div>')
    .replace(/<h3>完全補完文<\/h3>([\s\S]*?)(?=<h[234]>|<table|<hr|<ul>|$)/g,'<h3>完全補完文</h3><div class="completed-text">$1</div>')
    .replace(/<h3>Fully Supplemented Text<\/h3>([\s\S]*?)(?=<h[234]>|<table|<hr|<ul>|$)/g,'<h3>Fully Supplemented Text</h3><div class="completed-text">$1</div>');
  h=h.replace(/⁽(\d+)⁾/g,'<sup style="font-size:10px;color:var(--text2);">($1)</sup>');
  return styleCompletedConj(h);
}

    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},

    r.onload=()=>resolve(String(r.result).split(',')[1]||'');

  const ct=prob.answers.reduce((t,a,i)=>t.replace(`【_${i+1}_】`,`[${a}]`),prob.text);

[Problem with correct answers]
${ct}

[Correct answers]
${prob.answers.map((a,i)=>`(${i+1}) ${a}`).join('\n')}

[Learner's answers]
${ua.map((a,i)=>`(${i+1}) ${a}`).join('\n')}

## Fully Supplemented Text

  :`穴埋め問題（難易度${prob.diff}/5）の添削をしてください。

【正解】${prob.answers.map((a,i)=>`（${i+1}）${a}`).join('\n')}
【学習者の回答】${ua.map((a,i)=>`（${i+1}）${a}`).join('\n')}

## 完全補完文
「完全補完文」として、元の文章のすべての文と文の間（穴埋め箇所以外も含む）に接続詞を補完した、論理的に完全な文章を作成してください。
補完した接続詞はすべて**太字**で示してください。
穴埋め問題の空欄に対応する接続詞には、補完した接続詞の直後に上付き文字で設問番号を示してください。例：「しかるに⁽¹⁾」のように記述してください。

## 各設問の正誤と解説
各番号について ✓正解 または ✗不正解 を明示し、なぜその接続詞が適切か前後の論理関係を説明してください。代替接続詞があれば添えてください。

  const length=F_LENGTH[prob.diff]||500;
  const gradeMaxTokens=Math.round(length*4.0);
  return callClaude(prompt,sys,gradeMaxTokens);

  const ta=document.getElementById(taId);if(!ta)return;

  const cnt=ta.value.replace(/\s/g,'').length;
  const lbl=document.getElementById(lblId);
  const warn=document.getElementById(warnId);
  const l=L[st.lang];
  if(lbl){lbl.textContent=cnt+' / '+target+l.charOf;lbl.className='cc '+(cnt>target?'over':'ok2');}

  if(warn){warn.textContent=cnt>target?`⚠ ${cnt-target}${l.charOver}`:'';warn.classList.toggle('show',cnt>target);}

  const gw=document.getElementById(mode==='pp'?'pp-owarn':'s-owarn');
  if(gw){gw.textContent=anyOver?l.overWarn:'';gw.classList.toggle('show',anyOver);}

  if(btn)btn.disabled=anyOver;
}

  const userTexts=collectSummaryAnswers(prob,'live');

  const fb=document.getElementById('s-fb');
  fb.innerHTML=`<p class="loading"><span class="dots">${L[st.lang].loading}</span></p>`;
  const isEN=prob.lang==='en';
  const sys=isEN
    ?'You are an expert writing teacher for Japanese university entrance exam modern-text questions. Give structured feedback in English using markdown (## headings, **bold**, numbered lists).'
    :'あなたは大学受験・現代文の記述指導の専門家です。マークダウン（**太字**、## 見出し、番号リスト）を使って構造的に日本語でフィードバックしてください。';
  const prompt=buildSummaryGradePrompt(prob,userTexts);
  try{
    const diff=prob.diff||st.sDiff;
    const length=prob.length||(diff<=3?S_LENGTH_FIXED[diff]:S_LENGTH_VARIABLE[(prob.sVolume||st.sVolume||'short')].chars);
    const gradeMaxTokens=length<=500?1500:length<=2000?3500:7000;
    const res=await callClaude(prompt,sys,gradeMaxTokens);if(!res)return;
    fb.innerHTML=`<div class="feedback-box">${formatSummaryFeedback(res)}</div>`;
    prob.feedback=res;
    document.getElementById('ss2').className='step done';
    document.getElementById('ss3').className='step done';
    document.getElementById('s-pa-btn').style.display='';
  }catch(e){fb.innerHTML=`<p class="err">${L[st.lang].gradingErr}: ${e.message}</p>`;}
  btn.disabled=false;
}

// ══════════════════════════════════════════════════════════
// 過去問共通
// ══════════════════════════════════════════════════════════
function filterPast(mode,f){
  if(mode==='fill')st.fFilter=f;else st.sFilter=f;
  document.querySelectorAll('#'+(mode==='fill'?'fp':'sp')+'-tabs .pf-tab').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
  renderPL(mode);
}
async function loadPast(mode){
  setSync(mode,'spin',L[st.lang].syncLoading);
  try{const d=await gasGet(mode);if(mode==='fill')st.fPast=d;else st.sPast=d;setSync(mode,'ok',d.length+L[st.lang].syncItems);renderPL(mode);}
  catch(e){setSync(mode,'err',L[st.lang].syncFailed);document.getElementById((mode==='fill'?'fp':'sp')+'-list').innerHTML=`<div class="pempty">${esc(e.message)}</div>`;}
}
function renderPL(mode){
  const all=mode==='fill'?st.fPast:st.sPast;
  const f=mode==='fill'?st.fFilter:st.sFilter;
  const byDiff=f==='all'?all:all.filter(p=>String(p.diff)===f);
  const list=byDiff.filter(p=>(p.lang||'ja')===st.lang);
  const c=document.getElementById((mode==='fill'?'fp':'sp')+'-list');
  if(!list.length){c.innerHTML=`<div class="pempty"><i class="ti ti-inbox" style="font-size:26px;display:block;margin-bottom:.4rem;"></i>${L[st.lang].noData}</div>`;return;}
  c.innerHTML=list.map(p=>`
    <div class="pcard" onclick="openPast('${mode}','${p.id}')">
      <div class="pc-h"><div class="pc-t">${esc(p.theme)}</div>
        <div class="pc-m"><span class="badge ${BADGE[p.diff]||'b3'}">${dlabel(p.diff)}</span></div></div>
      <div class="pc-pre">${esc(String(mode==='fill'?p.text:(p.text||'')).replace(/【_\d+_】/g,'[  ]').substring(0,80))}</div>
      <div class="pc-date">${fmtDate(p.date)}${p.lang?' · '+p.lang.toUpperCase():''}</div>
    </div>`).join('');
}
function randomPast(mode){
  const all=mode==='fill'?st.fPast:st.sPast;
  const f=mode==='fill'?st.fFilter:st.sFilter;
  const byDiff=f==='all'?all:all.filter(p=>String(p.diff)===f);
  const pool=byDiff.filter(p=>(p.lang||'ja')===st.lang);
  if(!pool.length){alert(L[st.lang].noData);return;}
  openPast(mode,pool[Math.floor(Math.random()*pool.length)].id);
}

function openPast(mode,id){
  const all=mode==='fill'?st.fPast:st.sPast;
  const prob=all.find(p=>String(p.id)===String(id));if(!prob)return;
  const pLang=prob.lang||'ja';const l=L[pLang];
  document.getElementById((mode==='fill'?'fp':'sp')+'-list-view').style.display='none';
  document.getElementById((mode==='fill'?'fp':'sp')+'-play').style.display='block';
  const cnt=document.getElementById((mode==='fill'?'fp':'sp')+'-play-content');

  if(mode==='fill'){
    const answers=parseF(prob.answers);const hints=parseF(prob.hints);
    let html=esc(prob.text);
    for(let i=1;i<=answers.length;i++) html=html.replace(`【_${i}_】`,`<span class="blank" id="blank-${i}">（${i}）</span>`);
    cnt.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
        <strong>${esc(prob.theme)}</strong><span class="badge ${BADGE[prob.diff]||'b3'}">${dlabel(prob.diff)}</span></div>
      <div class="step-bar"><div class="step done"></div><div class="step active" id="pp-s2"></div><div class="step" id="pp-s3"></div></div>
      <div class="problem-box">${html}</div>
      <div class="answer-section" id="pp-inputs" style="margin-top:1rem;margin-bottom:1rem;"></div>
      <div class="divider"></div>
      <p class="slabel" style="margin-bottom:.5rem;">${l.chooseGrading}</p>
      <div class="action-bar" style="margin-top:0;">
        <button class="btn btn-icon" id="pp-offline-btn" onclick="ppOffline('${id}')"><i class="ti ti-list-check"></i> ${l.offlineBtn}</button>
      </div>
      <div class="action-bar" style="margin-top:8px;">
        <button class="btn btn-icon btn-outline" id="pp-api-btn" onclick="ppAPI('${id}')"><i class="ti ti-sparkles"></i> ${l.apiBtn}</button>
      </div>
      <div class="action-bar" style="margin-top:8px;">
        <button class="btn btn-icon btn-sm" onclick="window.print()">
          <i class="ti ti-printer"></i>
          <span>${l.pq}</span>
        </button>
      </div>
      <p style="font-size:11px;color:var(--text2);margin-top:6px;">${l.overwriteNote}</p>
      <div id="pp-fb" style="margin-top:.5rem;"></div>
      <div id="pp-ow-bar" class="action-bar" style="display:none;margin-top:.5rem;">
        <button class="btn btn-icon btn-sm" onclick="ppOverwrite('${id}')"><i class="ti ti-cloud-upload"></i> ${l.overwriteBtn}</button>
      </div>`;
    const sec=document.getElementById('pp-inputs');sec.innerHTML=`<p class="slabel">${l.answerBox}</p>`;
    const noHints=(prob.diff||1)>=3;
    answers.forEach((_,i)=>{
      sec.appendChild(buildFillAnswerItem(i,noHints?'':hints[i],`ppans-${i}`,false));
    });
  } else {
    const p=normSummaryProb(prob);
    const qHtml=p.questions.map((q,i)=>buildSummaryQuestionHtml(q,i,pLang,'pp')).join('');
    cnt.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
        <strong>${esc(prob.theme)}</strong><span class="badge ${BADGE[prob.diff]||'b3'}">${dlabel(prob.diff)}</span></div>
      <div class="step-bar"><div class="step done"></div><div class="step active" id="pp-s2"></div><div class="step" id="pp-s3"></div></div>
      <p class="slabel">${l.sInst}</p>
      <div class="problem-box">${esc(p.text)}</div>
      ${qHtml}
      <div id="pp-owarn" class="owarn" style="margin-bottom:.5rem;"></div>
      <button class="btn" id="pp-submit" onclick="ppSummary('${id}')"><span>${l.sSubmit}</span></button>
      <div class="action-bar" style="margin-top:8px;">
        <button class="btn btn-icon btn-sm" onclick="window.print()">
          <i class="ti ti-printer"></i>
          <span>${l.pq}</span>
        </button>
      </div>
      <div id="pp-fb"></div>`;
  }
}

function ppCC(i){updateSumCC(i,'pp');}


function ppOffline(id){
  const prob=st.fPast.find(p=>String(p.id)===String(id));if(!prob)return;
  const pLang=prob.lang||'ja';const l=L[pLang];
  const answers=parseF(prob.answers);const hints=parseF(prob.hints);
  const ua=answers.map((_,i)=>document.getElementById(`ppans-${i}`)?.value.trim()||'—');
  let correct=0,rows='';
  answers.forEach((ans,i)=>{const u=ua[i],ok=u===ans;if(ok)correct++;
    rows+=`<p style="margin-bottom:.5rem;">${ok?'<span class="ok">✓</span>':'<span class="ng">✗</span>'} <strong>（${i+1}）</strong> ${u} → ${esc(ans)}${hints[i]?` <span style="font-size:12px;color:var(--text2);">${esc(hints[i])}</span>`:''}</p>`;});
  const ct=answers.reduce((t,a,i)=>t.replace(`【_${i+1}_】`,`<strong>${esc(a)}</strong>`),esc(String(prob.text||'')));
  const mbar=`<div class="mode-bar"><i class="ti ti-list-check"></i> <strong>${l.offlineBtn}</strong></div>`;
  const scoreH=fillScoreHtml(correct,answers.length,pLang);
  document.getElementById('pp-fb').innerHTML=`${mbar}<div class="feedback-box">${scoreH}${rows}<h3>${l.correctTxt}</h3><p style="line-height:2.1;">${ct}</p>${prob.feedback?`<h3>${l.prevFb}</h3>${md2h(prob.feedback)}`:`<p style="color:var(--text2);font-size:13px;">${l.noPrevFb}</p>`}</div>`;
  document.getElementById('pp-s2').className='step done';
  document.getElementById('pp-s3').className='step done';
  document.getElementById('pp-offline-btn').disabled=true;
}

async function ppAPI(id){
  const prob=st.fPast.find(p=>String(p.id)===String(id));if(!prob)return;
  const pLang=prob.lang||'ja';const l=L[pLang];
  const answers=parseF(prob.answers);
  const ua=answers.map((_,i)=>document.getElementById(`ppans-${i}`)?.value.trim()||'—');
  const fbEl=document.getElementById('pp-fb');
  const mbar=`<div class="mode-bar"><i class="ti ti-sparkles"></i> <strong>${l.apiGrading}</strong></div>`;
  fbEl.innerHTML=mbar+`<p class="loading"><span class="dots">${l.loading}</span></p>`;
  const apiBtn=document.getElementById('pp-api-btn');if(apiBtn)apiBtn.disabled=true;
  try{
    const res=await gradeFill({...prob,answers,lang:pLang},ua);if(!res)return;
    fbEl.innerHTML=mbar+`<div class="feedback-box">${md2h(res)}</div>`;
    const owBar=document.getElementById('pp-ow-bar');
    if(owBar){owBar.style.display='flex';owBar.dataset.feedback=res;owBar.dataset.ua=JSON.stringify(ua);}
    document.getElementById('pp-s2').className='step done';
    document.getElementById('pp-s3').className='step done';
  }catch(e){fbEl.innerHTML=mbar+`<p class="err">${l.gradingErr}: ${e.message}</p>`;}
  if(apiBtn)apiBtn.disabled=false;
}

async function ppOverwrite(id){
  const owBar=document.getElementById('pp-ow-bar');if(!owBar)return;
  const newFb=owBar.dataset.feedback;const newUA=JSON.parse(owBar.dataset.ua||'[]');
  if(!newFb)return;
  const prob=st.fPast.find(p=>String(p.id)===String(id));if(!prob)return;
  setSync('fill','spin',L[st.lang].loading+'...');
  try{
    await gasPost({action:'delete',id:String(id),sheet:'fill'});
    const updated={...prob,answers:parseF(prob.answers),hints:parseF(prob.hints),feedback:newFb,userAnswers:newUA,sheet:'fill'};
    await gasPost(updated);
    const idx=st.fPast.findIndex(p=>String(p.id)===String(id));
    if(idx>=0)st.fPast[idx]={...st.fPast[idx],feedback:newFb,userAnswers:newUA};
    setSync('fill','ok',L[st.lang].overwriteOk);
    showToast(L[st.lang].overwriteOk);
    owBar.style.display='none';
  }catch(e){setSync('fill','err',L[st.lang].syncFailed);showToast('Error: '+e.message,4000);}
}

async function ppSummary(id){
  const prob=st.sPast.find(p=>String(p.id)===String(id));if(!prob)return;
  const pLang=prob.lang||'ja';const l=L[pLang];
  const anyOver=[...document.querySelectorAll('[id^="pp-sans-"]')].some(t=>t.value.replace(/\s/g,'').length>parseInt(t.dataset.target||0));
  if(anyOver){alert(l.overWarn);return;}
  const userTexts=collectSummaryAnswers(prob,'pp');
  const btn=document.getElementById('pp-submit');btn.disabled=true;
  const fb=document.getElementById('pp-fb');
  fb.innerHTML=`<p class="loading"><span class="dots">${l.loading}</span></p>`;
  const isEN=pLang==='en';
  const sys=isEN
    ?'You are an expert writing teacher for Japanese university entrance exam modern-text questions. Give structured feedback in English using markdown.'
    :'あなたは大学受験・現代文の記述指導の専門家です。マークダウンを使って構造的に日本語でフィードバックしてください。';
  const prompt=buildSummaryGradePrompt(prob,userTexts);
  try{
    const diff=prob.diff||st.sDiff;
    const length=prob.length||(diff<=3?S_LENGTH_FIXED[diff]:S_LENGTH_VARIABLE[(prob.sVolume||st.sVolume||'short')].chars);
    const gradeMaxTokens=length<=500?1500:length<=2000?3500:7000;
    const res=await callClaude(prompt,sys,gradeMaxTokens);if(!res)return;
    fb.innerHTML=`<div class="feedback-box">${formatSummaryFeedback(res)}</div>`;
    document.getElementById('pp-s2').className='step done';
    document.getElementById('pp-s3').className='step done';
  }catch(e){fb.innerHTML=`<p class="err">${l.gradingErr}: ${e.message}</p>`;}
  btn.disabled=false;
}


function closePP(mode){
  document.getElementById((mode==='fill'?'fp':'sp')+'-list-view').style.display='';
  document.getElementById((mode==='fill'?'fp':'sp')+'-play').style.display='none';
  document.getElementById((mode==='fill'?'fp':'sp')+'-play-content').innerHTML='';
}
async function deletePast(mode,id){
  if(!confirm(L[st.lang].delConfirm))return;
  setSync(mode,'spin',L[st.lang].loading+'...');
  try{
    await gasPost({action:'delete',id:String(id),sheet:mode});
    if(mode==='fill')st.fPast=st.fPast.filter(p=>String(p.id)!==String(id));
    else st.sPast=st.sPast.filter(p=>String(p.id)!==String(id));
    const n=mode==='fill'?st.fPast.length:st.sPast.length;
    setSync(mode,'ok',n+L[st.lang].syncItems);renderPL(mode);showToast(L[st.lang].deletedOk);
  }catch(e){setSync(mode,'err',L[st.lang].syncFailed);showToast('Error: '+e.message,4000);}
}

// ── 校閲 ─────────────────────────────────────────────────
async function doReview(){
  const l=L[st.lang];
  const text=document.getElementById('r-text').value.trim();
  const errEl=document.getElementById('r-text-err');
  if(!text){
    if(errEl){errEl.textContent=l.rTextRequired;errEl.classList.add('show');}
    document.getElementById('r-text')?.focus();
    return;
  }
  if(errEl){errEl.textContent='';errEl.classList.remove('show');}
  if(isBusy()||!hasApiKey())return;
  const btn=document.getElementById('r-btn');
  btn.disabled=true;
  document.getElementById('r-result').style.display='none';
  const fbEl=document.getElementById('r-fb');
  fbEl.innerHTML=`<p class="loading"><span class="dots">${l.loading}</span></p>`;
  document.getElementById('r-result').style.display='block';
  const isEN=st.lang==='en';
  const premise=document.getElementById('r-premise')?.value.trim()||'';
  const sys=isEN
    ?'You are a professional editor. Give structured feedback using markdown. When images are provided, use them as reference for context.'
    :'あなたは日本語の論理的文章の専門編集者です。マークダウンを使って構造的に書いてください。画像が添付されている場合は前提情報として参照してください。';
  const promptText=buildReviewPrompt(text,premise,isEN);
  try{
    const images=await buildReviewImageBlocks(_reviewImageFiles||[]);
    const content=images.length
      ?[...images,{type:'text',text:promptText}]
      :promptText;
    const fb=await callClaudeMsg(sys,content,3000);if(!fb)return;
    fbEl.innerHTML=md2h(fb);
  }catch(e){
    fbEl.innerHTML=`<p class="err">${l.reviewFailed}: ${esc(e.message)}</p>`;
  }
  btn.disabled=!hasApiKey();
  updateApiKeyUI();
}

// ── Init ─────────────────────────────────────────────────
function init(){
  const savedLang=localStorage.getItem(LANG_KEY);
  if(savedLang)st.lang=savedLang;
  loadApiKey();
  applyLang();
  switchSub('fill','new');
  switchSub('summary','new');
  document.getElementById('apikey').addEventListener('input',updateApiKeyUI);
  setDiff('s',st.sDiff);
  setThemeMode('f',st.fThemeMode||'keyword');
  setThemeMode('s',st.sThemeMode||'keyword');
}
init();
</script>
