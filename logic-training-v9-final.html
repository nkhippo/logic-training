<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>論理トレーニング</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
@media print {
  .no-print{display:none!important;}
  body{background:#fff!important;padding:0!important;}
  .app{max-width:100%!important;}
  .problem-box{background:#fff!important;border:1px solid #aaa!important;font-size:13pt!important;line-height:2.2!important;}
  .blank{border:1px solid #333!important;background:#fff!important;min-width:80px!important;}
  .print-header{display:block!important;}
  .summary-block-print{display:block!important;}
  @page{size:A4;margin:18mm 14mm;}
}
.print-header{display:none;margin-bottom:1.5rem;}
.print-header h2{font-size:14pt;font-weight:bold;margin-bottom:.4rem;}
.print-header p{font-size:10pt;color:#555;margin-bottom:.2rem;}
.summary-block-print{display:none;}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#6b6b6b;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.25);
  --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#085041;
  --purple:#7F77DD;--r-md:8px;--r-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#242426;
  --text:#f0f0f0;--text2:#999;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.22);
  --green-bg:#085041;--green-text:#9FE1CB;
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg3);color:var(--text);display:flex;justify-content:center;padding:2rem 1rem 5rem;min-height:100vh;}
.app{width:100%;max-width:700px;}
h1{font-size:20px;font-weight:500;margin-bottom:.2rem;}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:1.25rem;}
.api-bar{background:var(--bg);border:.5px solid var(--border2);border-radius:var(--r-lg);padding:1rem 1.25rem;margin-bottom:1rem;}
.api-row{display:flex;gap:8px;align-items:center;}
.api-bar label{font-size:13px;color:var(--text2);white-space:nowrap;}
.api-bar input[type=password]{flex:1;padding:8px 10px;border:.5px solid var(--border2);border-radius:var(--r-md);font-size:13px;background:var(--bg2);color:var(--text);}
.api-save-btn{padding:7px 12px;border:.5px solid var(--border2);border-radius:var(--r-md);background:transparent;cursor:pointer;font-size:12px;color:var(--text2);white-space:nowrap;}
.api-save-btn:hover{background:var(--bg2);}
.api-note{font-size:12px;color:var(--text2);margin-top:8px;}
.api-note a{color:var(--text2);}
.api-saved-badge{font-size:11px;color:var(--green);margin-top:5px;display:none;}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;}
.tab{flex:1;padding:9px 4px;border:.5px solid var(--border2);border-radius:var(--r-md);background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);text-align:center;transition:all .15s;}
.tab.active{background:var(--bg2);color:var(--text);}
.panel{display:none;}.panel.active{display:block;}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;margin-bottom:1rem;}
label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:500px){.row3,.row2{grid-template-columns:1fr;}}
input[type=number],input[type=text],textarea{width:100%;padding:8px 10px;border:.5px solid var(--border2);border-radius:var(--r-md);font-size:14px;background:var(--bg2);color:var(--text);font-family:inherit;}
textarea{resize:vertical;}
.btn{width:100%;padding:10px;background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--r-md);font-size:14px;font-weight:500;cursor:pointer;color:var(--text);transition:background .15s;}
.btn:hover{background:var(--bg3);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-icon{width:auto;padding:8px 14px;font-size:13px;display:inline-flex;align-items:center;gap:6px;}
.btn-sm{width:auto;padding:6px 12px;font-size:12px;}
.btn-outline{background:transparent;border:.5px solid var(--border2);}
.difficulty-row{display:flex;gap:5px;margin-bottom:10px;}
.diff-btn{flex:1;padding:7px 2px;border:.5px solid var(--border2);border-radius:var(--r-md);background:transparent;cursor:pointer;font-size:11px;color:var(--text2);text-align:center;line-height:1.6;transition:all .15s;}
.diff-btn[data-d="1"].selected{background:#EAF3DE;border-color:#639922;color:#3B6D11;}
.diff-btn[data-d="2"].selected{background:#E1F5EE;border-color:#1D9E75;color:#085041;}
.diff-btn[data-d="3"].selected{background:#E6F1FB;border-color:#378ADD;color:#185FA5;}
.diff-btn[data-d="4"].selected{background:#FAEEDA;border-color:#EF9F27;color:#854F0B;}
.diff-btn[data-d="5"].selected{background:#FAECE7;border-color:#D85A30;color:#712B13;}
.diff-desc{font-size:12px;color:var(--text2);margin-bottom:12px;padding:6px 10px;background:var(--bg2);border-radius:var(--r-md);line-height:1.5;}
.problem-box{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-md);padding:1.25rem;font-size:15px;line-height:2.1;margin-bottom:1rem;}
.blank{display:inline-block;background:var(--bg);border:.5px solid var(--border2);border-radius:4px;min-width:56px;text-align:center;padding:2px 6px;margin:0 2px;font-size:13px;color:var(--text2);}
.answer-section{display:grid;gap:8px;margin-bottom:1rem;}
.answer-row{display:flex;align-items:center;gap:10px;}
.answer-row label{margin:0;min-width:46px;font-size:13px;white-space:nowrap;}
.answer-row input{flex:1;}
.hint{font-size:12px;color:var(--text2);}
.feedback-box{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r-md);padding:1.25rem;font-size:14px;line-height:1.85;margin-top:1rem;}
.feedback-box h3{font-size:15px;font-weight:500;margin:1.1rem 0 .45rem;padding-bottom:.3rem;border-bottom:.5px solid var(--border);}
.feedback-box h3:first-child{margin-top:0;}
.feedback-box p{margin-bottom:.55rem;}
.feedback-box ol,.feedback-box ul{padding-left:1.4rem;margin-bottom:.55rem;}
.feedback-box li{margin-bottom:.3rem;}
.feedback-box strong{font-weight:500;}
.correct{color:var(--green);font-weight:500;}
.incorrect{color:#D85A30;font-weight:500;}
.completed-text{background:var(--green-bg);border:.5px solid var(--green);border-radius:var(--r-md);padding:1rem 1.25rem;margin-top:.5rem;font-size:14px;line-height:2.1;color:var(--green-text);}
.step-bar{display:flex;gap:6px;margin-bottom:1rem;}
.step{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s;}
.step.done{background:var(--green);}
.step.active{background:var(--purple);}
.action-bar{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;}
.loading{color:var(--text2);font-size:14px;padding:.75rem 0;}
.dots::after{content:'.';animation:dots 1.2s steps(3,end) infinite;}
@keyframes dots{0%,20%{content:'.'}40%{content:'..'}80%,100%{content:'...'}}
.err{color:#D85A30;font-size:14px;padding:.5rem 0;}
.section-label{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px;}
.theme-tag{display:inline-block;font-size:12px;background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--r-md);padding:3px 10px;margin-bottom:10px;color:var(--text2);}
/* 過去問の答え合わせ種別バナー */
.grading-mode-bar{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-md);padding:.6rem 1rem;font-size:13px;color:var(--text2);margin-bottom:.75rem;display:flex;align-items:center;gap:8px;}
.grading-mode-bar strong{color:var(--text);}
/* 要約ブロック */
.summary-block{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;margin-bottom:1rem;}
.summary-block-label{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:.5rem;}
.summary-block-source{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-md);padding:1rem;font-size:14px;line-height:1.9;margin-bottom:.75rem;}
.summary-answer-ta{width:100%;border:.5px solid var(--border2);border-radius:var(--r-md);padding:10px;font-size:14px;background:var(--bg2);color:var(--text);font-family:inherit;resize:vertical;line-height:1.7;transition:border-color .15s;}
.summary-answer-ta.over-limit{border-color:#D85A30!important;}
.char-counter{font-size:12px;text-align:right;margin-top:3px;color:var(--text2);}
.char-counter.over{color:#D85A30;font-weight:500;}
.char-counter.ok{color:var(--green);}
.over-warning{font-size:12px;color:#D85A30;margin-top:4px;display:none;}
.over-warning.show{display:block;}
/* 過去問セクション */
.past-section{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;margin-top:1rem;}
.past-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.85rem;}
.past-section-title{font-size:15px;font-weight:500;}
.past-filter-tabs{display:flex;gap:5px;margin-bottom:.75rem;flex-wrap:wrap;}
.pf-tab{padding:5px 10px;border:.5px solid var(--border2);border-radius:var(--r-md);background:transparent;cursor:pointer;font-size:11px;color:var(--text2);white-space:nowrap;}
.pf-tab.active{background:var(--bg2);color:var(--text);font-weight:500;}
.past-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;}
.sync-status{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:#D85A30;}
.sync-dot.spin{background:#EF9F27;animation:pulse .8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.past-list{display:grid;gap:8px;}
.past-empty{text-align:center;padding:2rem 1rem;color:var(--text2);font-size:13px;line-height:1.8;}
.past-card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-md);padding:.85rem 1rem;cursor:pointer;transition:border-color .15s;}
.past-card:hover{border-color:var(--border2);}
.pc-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px;}
.pc-title{font-size:13px;font-weight:500;}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:var(--r-md);}
.b1{background:#EAF3DE;color:#3B6D11;}.b2{background:#E1F5EE;color:#085041;}
.b3{background:#E6F1FB;color:#185FA5;}.b4{background:#FAEEDA;color:#854F0B;}.b5{background:#FAECE7;color:#712B13;}
.pc-preview{font-size:12px;color:var(--text2);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.pc-date{font-size:11px;color:var(--text2);margin-top:4px;}
.pc-meta{display:flex;gap:5px;align-items:center;}
.pc-delete{padding:3px 7px;font-size:11px;color:var(--text2);background:transparent;border:.5px solid var(--border2);border-radius:var(--r-md);cursor:pointer;flex-shrink:0;}
.pc-delete:hover{color:#D85A30;border-color:#D85A30;}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);cursor:pointer;background:none;border:none;padding:0;margin-bottom:1rem;}
.back-btn:hover{color:var(--text);}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--bg);border:.5px solid var(--border2);border-radius:var(--r-lg);padding:.75rem 1.25rem;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.15);display:none;z-index:999;max-width:380px;text-align:center;line-height:1.6;}
.toast.show{display:block;}
/* 区切り */
.divider{height:.5px;background:var(--border);margin:1rem 0;}
</style>
</head>
<body>
<div class="app">
  <h1 class="no-print">論理トレーニング</h1>
  <p class="subtitle no-print">接続詞の使い方を磨く</p>

  <div class="api-bar no-print">
    <div class="api-row">
      <label for="apikey">Claude APIキー</label>
      <input type="password" id="apikey" placeholder="sk-ant-..." autocomplete="current-password"/>
      <button class="api-save-btn" onclick="saveApiKey()"><i class="ti ti-device-floppy" aria-hidden="true"></i> 保存</button>
    </div>
    <div class="api-saved-badge" id="api-saved-badge"><i class="ti ti-check" aria-hidden="true"></i> このブラウザに保存済み</div>
    <p class="api-note">取得先: <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys　／　従量課金・1問あたり約0.5〜1円</p>
  </div>

  <div class="tabs no-print">
    <button class="tab active" onclick="switchTab('fill')"><i class="ti ti-puzzle" aria-hidden="true"></i> 穴埋め</button>
    <button class="tab" onclick="switchTab('review')"><i class="ti ti-checklist" aria-hidden="true"></i> 校閲</button>
    <button class="tab" onclick="switchTab('summary')"><i class="ti ti-align-left" aria-hidden="true"></i> 要約</button>
  </div>

  <!-- ══ 穴埋め ══ -->
  <div id="fill-panel" class="panel active">
    <div class="card no-print">
      <div class="row3">
        <div><label>テーマ <span style="font-size:11px;color:var(--text2);">（省略可）</span></label><input type="text" id="f-theme" placeholder="例: AI と社会"/></div>
        <div><label>文字数（目安）</label><input type="number" id="f-length" value="300" min="100" max="800" step="50"/></div>
        <div><label>穴埋め数</label><input type="number" id="f-blanks" value="5" min="2" max="10"/></div>
      </div>
      <label>難易度</label>
      <div class="difficulty-row" id="f-diff-row">
        <button class="diff-btn" data-d="1" onclick="setDiff('f',1)">★☆☆☆☆<br>やさしい</button>
        <button class="diff-btn" data-d="2" onclick="setDiff('f',2)">★★☆☆☆<br>基礎</button>
        <button class="diff-btn selected" data-d="3" onclick="setDiff('f',3)">★★★☆☆<br>標準</button>
        <button class="diff-btn" data-d="4" onclick="setDiff('f',4)">★★★★☆<br>難しい</button>
        <button class="diff-btn" data-d="5" onclick="setDiff('f',5)">★★★★★<br>東大レベル</button>
      </div>
      <div class="diff-desc" id="f-diff-desc">接続詞を補足なしで空欄にします。順接・逆接・因果など基本的な関係を問います。</div>
      <button class="btn" id="f-gen-btn" onclick="generateFill()">問題を生成する</button>
    </div>

    <div id="fill-result" style="display:none;">
      <div class="print-header" id="f-print-header"></div>
      <div class="step-bar no-print">
        <div class="step done" id="f-s1"></div><div class="step active" id="f-s2"></div><div class="step" id="f-s3"></div>
      </div>
      <div id="f-theme-tag"></div>
      <p class="section-label no-print">問題文 — 空欄に当てはまる接続詞を答えてください</p>
      <div class="problem-box" id="f-problem-display"></div>
      <div class="answer-section" id="f-answer-inputs"></div>
      <div class="action-bar no-print">
        <button class="btn" id="f-submit-btn" onclick="submitFill()">答え合わせをする</button>
      </div>
      <div class="action-bar no-print" style="margin-top:8px;">
        <button class="btn btn-icon btn-sm" onclick="doPrint('fill','problem')"><i class="ti ti-printer" aria-hidden="true"></i> 問題を印刷</button>
        <button class="btn btn-icon btn-sm" id="f-print-ans-btn" style="display:none;" onclick="doPrint('fill','answer')"><i class="ti ti-printer" aria-hidden="true"></i> 解説を印刷</button>
      </div>
      <div id="f-feedback"></div>
      <div id="f-save-bar" class="action-bar no-print" style="display:none;">
        <button class="btn btn-icon" onclick="saveFill()"><i class="ti ti-cloud-upload" aria-hidden="true"></i> 過去問として保存（全端末に同期）</button>
      </div>
    </div>

    <!-- 穴埋め 過去問セクション -->
    <div class="past-section no-print">
      <div id="fill-past-list-view">
        <div class="past-section-header">
          <span class="past-section-title">穴埋め 過去問</span>
          <button class="btn btn-icon btn-sm" onclick="randomPast('fill')"><i class="ti ti-shuffle" aria-hidden="true"></i> ランダム</button>
        </div>
        <div class="past-filter-tabs" id="fill-pf">
          <button class="pf-tab active" data-f="all" onclick="filterPast('fill','all')">すべて</button>
          <button class="pf-tab" data-f="1" onclick="filterPast('fill','1')">★やさしい</button>
          <button class="pf-tab" data-f="2" onclick="filterPast('fill','2')">★★基礎</button>
          <button class="pf-tab" data-f="3" onclick="filterPast('fill','3')">★★★標準</button>
          <button class="pf-tab" data-f="4" onclick="filterPast('fill','4')">★★★★難</button>
          <button class="pf-tab" data-f="5" onclick="filterPast('fill','5')">★★★★★上級</button>
        </div>
        <div class="past-toolbar">
          <div class="sync-status"><div class="sync-dot" id="fill-sync-dot"></div><span id="fill-sync-lbl">—</span></div>
          <button class="btn btn-icon btn-sm" onclick="loadPast('fill')"><i class="ti ti-refresh" aria-hidden="true"></i> 更新</button>
        </div>
        <div class="past-list" id="fill-past-list"></div>
      </div>
      <div id="fill-past-play" style="display:none;">
        <button class="back-btn" onclick="closePastPlay('fill')"><i class="ti ti-arrow-left" aria-hidden="true"></i> 一覧に戻る</button>
        <div id="fill-past-play-content"></div>
      </div>
    </div>
  </div>

  <!-- ══ 校閲 ══ -->
  <div id="review-panel" class="panel">
    <div class="card no-print">
      <label>校閲する文章を貼り付けてください</label>
      <textarea id="r-text" style="min-height:180px;" placeholder="ここに文章を入力してください..."></textarea>
      <button class="btn" style="margin-top:12px;" id="r-btn" onclick="doReview()">接続詞・論理性をチェックする</button>
    </div>
    <div id="r-result" style="display:none;">
      <div class="feedback-box" id="r-feedback"></div>
    </div>
  </div>

  <!-- ══ 要約 ══ -->
  <div id="summary-panel" class="panel">
    <div class="card no-print">
      <div class="row3">
        <div><label>テーマ <span style="font-size:11px;color:var(--text2);">（省略可）</span></label><input type="text" id="s-theme" placeholder="例: 環境問題"/></div>
        <div><label>問題文の文字数（目安）</label><input type="number" id="s-length" value="400" min="200" max="1000" step="50"/></div>
        <div><label>要約数 <span style="font-size:11px;color:var(--text2);">（1=全体）</span></label><input type="number" id="s-count" value="1" min="1" max="5"/></div>
      </div>
      <label>難易度</label>
      <div class="difficulty-row" id="s-diff-row">
        <button class="diff-btn" data-d="1" onclick="setDiff('s',1)">★☆☆☆☆<br>やさしい</button>
        <button class="diff-btn" data-d="2" onclick="setDiff('s',2)">★★☆☆☆<br>基礎</button>
        <button class="diff-btn selected" data-d="3" onclick="setDiff('s',3)">★★★☆☆<br>標準</button>
        <button class="diff-btn" data-d="4" onclick="setDiff('s',4)">★★★★☆<br>難しい</button>
        <button class="diff-btn" data-d="5" onclick="setDiff('s',5)">★★★★★<br>東大レベル</button>
      </div>
      <div class="diff-desc" id="s-diff-desc">標準的な評論・論説文。各ブロックの要約目標は原文の約40%。</div>
      <button class="btn" id="s-gen-btn" onclick="generateSummary()">問題を生成する</button>
    </div>

    <div id="summary-result" style="display:none;">
      <div class="print-header" id="s-print-header"></div>
      <div class="step-bar no-print">
        <div class="step done" id="s-s1"></div><div class="step active" id="s-s2"></div><div class="step" id="s-s3"></div>
      </div>
      <div id="s-theme-tag"></div>
      <div id="s-blocks"></div>
      <div id="s-over-warning" class="over-warning">⚠ 文字数オーバーのブロックがあります。修正してから答え合わせしてください。</div>
      <div class="action-bar no-print" style="margin-top:1rem;">
        <button class="btn" id="s-submit-btn" onclick="submitSummary()">添削してもらう</button>
      </div>
      <div class="action-bar no-print" style="margin-top:8px;">
        <button class="btn btn-icon btn-sm" onclick="doPrint('summary','problem')"><i class="ti ti-printer" aria-hidden="true"></i> 問題を印刷</button>

<script>
// ── Config（GAS URLはデプロイ後に書き換えてください） ──────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyjdXgjQ3y9DBU_zgvFJ00WwqzWc26K4eUh86om7fxi2P9FAWm8M0T6o2ls-M8l3Kun/exec';
const APIKEY_KEY = 'logic_v9_apikey';

// ── Constants ─────────────────────────────────────────────
const DIFF_LABELS = {1:'★やさしい',2:'★★基礎',3:'★★★標準',4:'★★★★難しい',5:'★★★★★東大レベル'};
const BADGE_CLS   = {1:'b1',2:'b2',3:'b3',4:'b4',5:'b5'};
const F_DESCS = {

const F_PROMPTS = {

};
const S_DESCS = {

  2:'基礎的な論説文。各ブロックの要約目標は原文の約50%。',

};
const S_RATIO   = {1:.6,2:.5,3:.4,4:.3,5:.2};
const S_PROMPTS = {
  1:'難易度1: 日常的な話題・具体的な事例を含む説明文。中学生が理解できるレベル。各ブロックは60%程度に要約できる内容。',

  4:'難易度4: 大学院入試レベルの論述文。高度な抽象化が必要で、各ブロックは30%程度に要約できる内容。',
  5:'難易度5（東京大学入試レベル以上）: 哲学・社会科学・自然科学の専門的評論文。複雑な論証構造を持ち、各ブロックは20%程度に要約できる内容。東大国語の問題文レベルを目指すこと。'
};

// ── State ─────────────────────────────────────────────────
const st = {
  fDiff:3, sDiff:3,
  fFilter:'all', sFilter:'all',
  fPast:[], sPast:[],

};

// ── APIキー ───────────────────────────────────────────────
function loadApiKey(){ const v=localStorage.getItem(APIKEY_KEY); if(v){document.getElementById('apikey').value=v;document.getElementById('api-saved-badge').style.display='block';}}
function saveApiKey(){ const k=document.getElementById('apikey').value.trim(); if(!k){alert('APIキーを入力してください。');return;} localStorage.setItem(APIKEY_KEY,k); document.getElementById('api-saved-badge').style.display='block'; showToast('APIキーを保存しました ✓');}
function getKey(){ const k=document.getElementById('apikey').value.trim(); if(!k){alert('APIキーを入力してください。');return null;} return k;}

// ── Helpers ───────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(s){ if(!s)return''; const d=new Date(s); return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;}
function showToast(msg,ms=3500){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),ms);}
function setSS(mode,cls,msg){ document.getElementById(mode+'-sync-dot').className='sync-dot'+(cls?' '+cls:''); document.getElementById(mode+'-sync-lbl').textContent=msg;}
function parseF(v){ if(Array.isArray(v))return v; try{return JSON.parse(v);}catch{return[];}}
function setDiff(m,d){
  if(m==='f') st.fDiff=d; else st.sDiff=d;
  document.querySelectorAll('#'+(m==='f'?'f':'s')+'-diff-row .diff-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.dataset.d)===d));
  document.getElementById((m==='f'?'f':'s')+'-diff-desc').textContent=m==='f'?F_DESCS[d]:S_DESCS[d];
}
function switchTab(name){
  ['fill','review','summary'].forEach((n,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',n===name);
    document.getElementById(n+'-panel').classList.toggle('active',n===name);
  });
  if(name==='fill') loadPast('fill');
  if(name==='summary') loadPast('summary');
}
function md2html(t){
  return String(t||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^#{2,3} (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/✓/g,'<span class="correct">✓</span>')
    .replace(/✗/g,'<span class="incorrect">✗</span>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/^[-・] (.+)$/gm,'<li>$1</li>')
    .replace(/((?:<li>[\s\S]*?<\/li>\n?)+)/g,'<ul>$1</ul>')
    .replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>')
    .replace(/「完全補完文」([\s\S]*?)(?=<h3>|$)/g,'<div class="completed-text">$1</div>');
}

// ── Claude API ────────────────────────────────────────────
async function callClaude(prompt,sys,maxTok=2500){
  const key=getKey(); if(!key)return null;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok,system:sys,messages:[{role:'user',content:prompt}]})
  });
  if(!res.ok){let m='APIエラー '+res.status; try{const e=await res.json();m=e.error?.message||m;}catch{} throw new Error(m);}
  const d=await res.json(); return d.content?.[0]?.text||'';
}
function safeJSON(raw){const m=raw.match(/\{[\s\S]*\}/);if(!m)throw new Error('JSONを抽出できませんでした');return JSON.parse(m[0]);}

// ── GAS ──────────────────────────────────────────────────
async function gasGet(sheet){ const r=await fetch(GAS_URL+'?sheet='+sheet+'&t='+Date.now()); if(!r.ok)throw new Error('読み込み失敗 '+r.status); return r.json();}
async function gasPost(data){ const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)}); if(!r.ok)throw new Error('書き込み失敗 '+r.status); return r.json();}

// ── 印刷 ─────────────────────────────────────────────────
function doPrint(mode,part){
  if(part==='answer'){
    const fb=document.getElementById(mode==='fill'?'f-feedback':'s-feedback');
    if(!fb||fb.innerHTML.trim()===''){alert('先に添削を実行してください。');return;}
  }
  window.print();
}

// 穴埋め
// ══════════════════════════════════════════════════════════
async function generateFill(){
  const themeIn=document.getElementById('f-theme').value.trim();
  const length=parseInt(document.getElementById('f-length').value)||300;
  const blanks=parseInt(document.getElementById('f-blanks').value)||5;
  const diff=st.fDiff; const hasTheme=themeIn.length>0;
  document.getElementById('f-gen-btn').disabled=true;
  document.getElementById('fill-result').style.display='none';
  document.getElementById('f-save-bar').style.display='none';
  const sys='あなたは論理的文章の作成と教育の専門家です。必ず指定されたJSON形式のみで返答してください。JSONの前後に説明文や```などのマークダウン記号を一切含めないでください。';
  const ti=hasTheme?`テーマ「${themeIn}」について、約${length}文字の論理的な文章を作成してください。`:`テーマは自由に選んでください（政治・経済・科学・哲学・文化など）。約${length}文字の論理的な文章を作成してください。`;
  const prompt=`${ti}\n${F_PROMPTS[diff]}\nその文章の中で接続詞のうち${blanks}個を選び、【_1_】【_2_】...のような番号付きプレースホルダーで置き換えてください。\n返答はJSON形式のみ：\n{"theme":"テーマを10文字以内で","text":"問題文","answers":["接続詞1"],"hints":["ヒント1"]}`;
  try{
    const raw=await callClaude(prompt,sys,1500); if(!raw)return;
    const p=safeJSON(raw);
    if(!p.text||!Array.isArray(p.answers))throw new Error('JSONの構造が不正です');
    st.fill={...p,theme:p.theme||(hasTheme?themeIn:''),diff,date:new Date().toISOString(),feedback:null,userAnswers:null};
    renderFill(st.fill);
  }catch(e){alert('問題の生成に失敗しました。\n'+e.message);}
  document.getElementById('f-gen-btn').disabled=false;
}

function renderFill(prob){
  document.getElementById('f-theme-tag').innerHTML=`<span class="theme-tag">テーマ：${esc(prob.theme||'—')}</span>`;
  document.getElementById('f-print-header').innerHTML=`<h2>穴埋め問題</h2><p>テーマ：${esc(prob.theme||'—')}　難易度：${DIFF_LABELS[prob.diff]}　${fmtDate(prob.date)}</p><p style="font-size:10pt;margin-top:.4rem;">指示：空欄（　　）に適切な接続詞を入れてください。</p>`;
  let html=esc(prob.text);
  for(let i=1;i<=prob.answers.length;i++) html=html.replace(`【_${i}_】`,`<span class="blank">（${i}）</span>`);
  document.getElementById('f-problem-display').innerHTML=html;
  const sec=document.getElementById('f-answer-inputs'); sec.innerHTML='<p class="section-label no-print">回答欄</p>';
  prob.answers.forEach((_,i)=>{
    const row=document.createElement('div'); row.className='answer-row';
    const hint=prob.hints?.[i];
    row.innerHTML=`<label>（${i+1}）</label><input type="text" id="fans-${i}" placeholder="接続詞を入力..."/>${hint?`<span class="hint no-print">${esc(hint)}</span>`:''}`;
    sec.appendChild(row);
  });
  document.getElementById('f-feedback').innerHTML='';
  document.getElementById('f-print-ans-btn').style.display='none';
  document.getElementById('fill-result').style.display='block';
  document.getElementById('f-s1').className='step done';
  document.getElementById('f-s2').className='step active';
  document.getElementById('f-s3').className='step';
}

// 穴埋め 答え合わせ（新問用）
async function submitFill(){
  const prob=st.fill; if(!prob)return;
  const ua=prob.answers.map((_,i)=>document.getElementById(`fans-${i}`)?.value.trim()||'（未回答）');
  await _gradeFill(prob,ua,'f-feedback','f-submit-btn',()=>{
    prob.feedback=_lastFeedback; prob.userAnswers=ua;
    document.getElementById('f-s2').className='step done';
    document.getElementById('f-s3').className='step done';
    document.getElementById('f-save-bar').style.display='flex';
    document.getElementById('f-print-ans-btn').style.display='';
  });
}

let _lastFeedback='';
async function _gradeFill(prob,ua,fbId,btnId,onDone){
  const btn=document.getElementById(btnId); if(btn)btn.disabled=true;
  const fb=document.getElementById(fbId);
  fb.innerHTML='<p class="loading"><span class="dots">添削中</span></p>';
  const sys='あなたは論理的文章の教育専門家です。マークダウン（**太字**、## 見出し、番号リスト）を使って構造的に日本語でフィードバックしてください。';
  const ct=prob.answers.reduce((t,a,i)=>t.replace(`【_${i+1}_】`,`[${a}]`),prob.text);
  const prompt=`穴埋め問題（難易度${prob.diff}/5）の添削をしてください。

【問題文（正解入り）】${ct}
【正解】${prob.answers.map((a,i)=>`（${i+1}）${a}`).join('\n')}
【学習者の回答】${ua.map((a,i)=>`（${i+1}）${a}`).join('\n')}

## 各設問の正誤と解説
各番号について ✓正解 または ✗不正解 を明示し、なぜその接続詞が適切か前後の論理関係を説明してください。代替接続詞があれば添えてください。

## 全体講評
論理的接続詞の使い方に関する総合的なポイントを述べてください。

## 完全補完文
「完全補完文」として、元の文章のすべての文と文の間（穴埋め箇所以外も含む）に接続詞を補完した、論理的に完全な文章を作成してください。補完した接続詞はすべて**太字**で示してください。`;
  try{
    const res=await callClaude(prompt,sys,2500); if(!res)return;
    _lastFeedback=res;
    fb.innerHTML=`<div class="feedback-box">${md2html(res)}</div>`;
    if(onDone) onDone();
  }catch(e){ fb.innerHTML=`<p class="err">添削に失敗しました: ${e.message}</p>`;}
  if(btn)btn.disabled=false;
}

// 穴埋め 保存
async function saveFill(){
  const p=st.fill; if(!p?.feedback){alert('先に答え合わせをしてください。');return;}
  setSS('fill','spin','保存中...');
  const entry={id:Date.now(),sheet:'fill',theme:p.theme||'未設定',diff:p.diff,date:p.date,text:p.text,answers:p.answers,hints:p.hints||[],feedback:p.feedback,userAnswers:p.userAnswers||[]};
  try{await gasPost(entry);st.fPast.unshift(entry);renderPastList('fill');setSS('fill','ok','保存完了');showToast('過去問を保存しました ✓');}
  catch(e){setSS('fill','err','保存失敗');showToast('保存失敗: '+e.message,4000);}
}

// ══════════════════════════════════════════════════════════
// 要約
// ══════════════════════════════════════════════════════════
async function generateSummary(){
  const themeIn=document.getElementById('s-theme').value.trim();
  const length=parseInt(document.getElementById('s-length').value)||400;
  const count=Math.max(1,parseInt(document.getElementById('s-count').value)||1);
  const diff=st.sDiff; const hasTheme=themeIn.length>0;
  document.getElementById('s-gen-btn').disabled=true;
  document.getElementById('summary-result').style.display='none';
  document.getElementById('s-save-bar').style.display='none';
  const sys='あなたは文章作成と教育の専門家です。必ず指定されたJSON形式のみで返答してください。JSONの前後に説明文や```などのマークダウン記号を一切含めないでください。';
  const ti=hasTheme?`テーマ「${themeIn}」について、約${length}文字の論理的な文章を作成してください。`:`テーマは自由に選んでください（政治・経済・科学・哲学・文化など）。約${length}文字の論理的な文章を作成してください。`;
  const bn=count===1?'文章全体を1つのまとまりとして作成してください。':`文章を意味的に明確な${count}つのブロック（段落またはトピック）に分けて作成してください。`;
  const ratio=S_RATIO[diff];
  const prompt=`${ti}\n${S_PROMPTS[diff]}\n${bn}\n返答はJSON形式のみ：\n{"theme":"テーマを10文字以内で","blocks":["ブロック1テキスト","ブロック2テキスト"],"labels":["ラベル1","ラベル2"],"ratio":${ratio}}\nblocksは${count}要素の配列にしてください。labelsは各ブロックの内容を5文字程度で表したラベル。`;
  try{
    const raw=await callClaude(prompt,sys,1800); if(!raw)return;
    const p=safeJSON(raw);
    if(!Array.isArray(p.blocks)||p.blocks.length===0)throw new Error('JSONの構造が不正です');
    const blocks=p.blocks.map((text,i)=>({text,label:p.labels?.[i]||`ブロック${i+1}`,targetChars:Math.round(text.replace(/\s/g,'').length*ratio)}));
    st.summary={theme:p.theme||(hasTheme?themeIn:''),diff,date:new Date().toISOString(),blocks,ratio,feedback:null};
    renderSummary(st.summary);
  }catch(e){alert('問題の生成に失敗しました。\n'+e.message);}
  document.getElementById('s-gen-btn').disabled=false;
}

function renderSummary(prob){
  document.getElementById('s-theme-tag').innerHTML=`<span class="theme-tag">テーマ：${esc(prob.theme||'—')}</span>`;
  document.getElementById('s-print-header').innerHTML=`<h2>要約問題</h2><p>テーマ：${esc(prob.theme||'—')}　難易度：${DIFF_LABELS[prob.diff]}　${fmtDate(prob.date)}</p><p style="font-size:10pt;margin-top:.4rem;">指示：各ブロックを指定文字数以内で要約してください。</p>`;
  const container=document.getElementById('s-blocks'); container.innerHTML='';
  prob.blocks.forEach((blk,i)=>{
    const lines=Math.max(4,Math.ceil(blk.targetChars/18));
    const printLines=Array(lines).fill('<div style="border-bottom:1px solid #ccc;height:26px;margin-bottom:1px;"></div>').join('');
    const div=document.createElement('div'); div.className='summary-block';
    div.innerHTML=`
      <div class="summary-block-label no-print">ブロック${i+1}${blk.label&&blk.label!==`ブロック${i+1}`?' — '+esc(blk.label):''} <span style="font-size:11px;color:var(--text2);">（目標 ${blk.targetChars}文字以内）</span></div>
      <div class="summary-block-source">${esc(blk.text)}</div>
      <div class="no-print">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <p class="section-label" style="margin:0;">あなたの要約</p>
          <span id="s-lbl-${i}" class="char-counter">0 / ${blk.targetChars}文字</span>
        </div>
        <textarea class="summary-answer-ta" id="sans-${i}"
          style="min-height:${Math.max(80,blk.targetChars*1.6)}px"
          data-target="${blk.targetChars}"
          oninput="updateCC(${i})"
          onblur="updateCC(${i})"
          placeholder="${blk.targetChars}文字以内で要約してください..."></textarea>
        <div id="s-warn-${i}" class="over-warning"></div>
      </div>
      <div class="summary-block-print">

async function submitPastFillAPI(id){
  const prob=st.fPast.find(p=>String(p.id)===String(id)); if(!prob)return;
  const answers=parseF(prob.answers);

// ── 穴埋め過去問：上書き保存 ─────────────────────────────
async function overwritePastFill(id){
  const owBar=document.getElementById('pp-overwrite-bar'); if(!owBar)return;
  const newFeedback=owBar.dataset.feedback; const newUA=JSON.parse(owBar.dataset.ua||'[]');
  if(!newFeedback){alert('添削結果がありません。');return;}
  setSS('fill','spin','更新中...');
  try{
    // 既存レコードを削除して新しいものを挿入
    const prob=st.fPast.find(p=>String(p.id)===String(id)); if(!prob)return;
    await gasPost({action:'delete',id:String(id),sheet:'fill'});
    const updated={...prob,feedback:newFeedback,userAnswers:newUA,sheet:'fill'};
    // answersがオブジェクトになっている場合はparseF済みのものを使う
    updated.answers=parseF(prob.answers); updated.hints=parseF(prob.hints); updated.userAnswers=newUA;
    await gasPost(updated);
    // ローカルキャッシュを更新
    const idx=st.fPast.findIndex(p=>String(p.id)===String(id));
    if(idx>=0) st.fPast[idx]={...st.fPast[idx],feedback:newFeedback,userAnswers:newUA};
    setSS('fill','ok','更新完了');
    showToast('添削を上書き保存しました ✓');
    owBar.style.display='none';
  }catch(e){setSS('fill','err','更新失敗');showToast('更新失敗: '+e.message,4000);}
}

  const prompt=`以下の文章を校閲してください。「接続詞の適切な使用」と「文章の論理性」に焦点を当ててください。\n【対象文章】${text}\n\n## 接続詞の補完提案\n## 接続詞の適切性チェック\n## 論理的一貫性の評価\n## 改善案\n## 完全補完文\n「完全補完文」として、すべての文と文の間に適切な接続詞を補完した文章を作成してください。補完した接続詞は**太字**で示してください。\n## 総評（★1〜5）`;
  try{
    const fb=await callClaude(prompt,sys,2000); if(!fb)return;
    document.getElementById('r-feedback').innerHTML=md2html(fb);
    document.getElementById('r-result').style.display='block';
  }catch(e){alert('校閲に失敗しました: '+e.message);}
  document.getElementById('r-btn').disabled=false;
}
